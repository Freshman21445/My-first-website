<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Cloudinary CORS</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .card { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 32px; max-width: 480px; width: 100%; border: 1px solid rgba(255,255,255,0.15); }
    h2 { margin: 0 0 8px; color: #ffd700; }
    p { color: rgba(255,255,255,0.7); font-size: 0.92em; margin-bottom: 24px; }
    .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #ff9800, #f39c12); color: white; border: none; border-radius: 30px; font-size: 1.05em; font-weight: 800; cursor: pointer; transition: all 0.3s; }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { background: #555; cursor: not-allowed; transform: none; }
    #status { margin-top: 20px; padding: 14px 20px; border-radius: 12px; font-weight: 700; display: none; }
    .success { background: rgba(39,174,96,0.25); border: 1px solid #27ae60; color: #2ecc71; }
    .error { background: rgba(231,76,60,0.25); border: 1px solid #e74c3c; color: #ff6b6b; }
    .info { background: rgba(52,152,219,0.25); border: 1px solid #3498db; color: #74b9ff; }
  </style>
</head>
<body>
<div class="card">
  <h2>☁️ Set Cloudinary CORS</h2>
  <p>This will allow your app to download PDFs directly from Cloudinary so students can use them offline.</p>
  <button class="btn" onclick="setCors()">🔧 Enable CORS for PDF Downloads</button>
  <div id="status"></div>
</div>

<script>
var CLOUD_NAME = 'dabjaexdb';
var API_KEY    = '438392763321227';
var API_SECRET = 'kHUaJ6ugOC-EpRYZHxErt_w2Hp4';

function show(msg, type){
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}

async function setCors(){
  var btn = document.querySelector('.btn');
  btn.disabled = true;
  btn.textContent = '⏳ Setting CORS…';
  show('Connecting to Cloudinary…', 'info');

  try {
    var creds = btoa(API_KEY + ':' + API_SECRET);
    var res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/config', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Basic ' + creds
      },
      body: JSON.stringify({ cors: '*' })
    });

    var data = await res.json();

    if(res.ok){
      show('✅ CORS enabled! Students can now download PDFs for offline use.', 'success');
      btn.textContent = '✅ Done!';
    } else {
      show('❌ Error: ' + (data.error && data.error.message ? data.error.message : JSON.stringify(data)), 'error');
      btn.disabled = false;
      btn.textContent = '🔧 Enable CORS for PDF Downloads';
    }
  } catch(e) {
    show('❌ Network error: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '🔧 Enable CORS for PDF Downloads';
  }
}
</script>
</body>
</html>
