<!DOCTYPE html>
<html>

<head>
  <title>Exam System</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      margin: 0;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    #msg {
      text-align: center;
      font-size: 1.2em;
      margin-bottom: 20px;
      padding: 10px;
      border-radius: 5px;
      min-height: 20px;
      color: white;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.4);
    }

    /* Auth box */
    #authBox {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
    }

    .auth-box {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      padding: 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
    }

    .auth-box h2 {
      color: #1e3c72;
      margin-bottom: 30px;
      text-align: center;
    }

    .auth-box input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 30px;
      border: 1px solid #ddd;
    }

    .auth-box button {
      width: 100%;
      padding: 12px;
      background: #ff9800;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .auth-box button:hover {
      background: #e68900;
    }

    /* Dashboard header with menu */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 20px;
    }

    .menu-btn {
      background: #3498db;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 8px 15px;
      border-radius: 30px;
      color: white;
      font-weight: bold;
    }

    .dashboard-header h2 {
      color: #1e3c72;
    }

    .logout-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
    }

    /* Courses grid */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
      margin-top: 30px;
      margin-bottom: 40px;
    }

    .course-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      text-align: center;
      border-bottom: 4px solid #ff9800;
    }

    .course-icon {
      font-size: 3.5em;
      background: rgba(255, 152, 0, 0.2);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
    }

    .course-card h3 {
      color: #1e3c72;
    }

    .infographic-fact {
      background: #fff3e0;
      padding: 8px;
      border-radius: 15px;
      margin-top: 12px;
      font-size: 0.8rem;
    }

    /* Material & Exam sections */
    #materialSection,
    #examSection {
      display: none;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .back-btn,
    .close-btn {
      background: #7f8c8d;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
    }

    .chapter-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .chapter-tab {
      background: #ecf0f1;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    .chapter-tab.active {
      background: #ff9800;
      color: white;
    }

    .locked-chapter {
      background: #bdc3c7;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .chapter-content {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 15px;
      min-height: 200px;
    }

    .premium-note {
      background: #ffeaa7;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      text-align: center;
    }

    /* Menu Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .modal-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    .modal-card button {
      background: #ff9800;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      margin: 10px;
      cursor: pointer;
    }

    .copy-btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 20px;
      cursor: pointer;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 25px;
      border: 1px solid #ccc;
    }
  </style>
