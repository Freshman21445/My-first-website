<!DOCTYPE html>
<html>

<head>
  <title>Exam System</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } 
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAavkqPwNgzo3UASsz-feaQvTjobxwkj-s",
      authDomain: "student-quiz-platform-9439a.firebaseapp.com",
      projectId: "student-quiz-platform-9439a",
      storageBucket: "student-quiz-platform-9439a.firebasestorage.app",
      messagingSenderId: "815750551646",
      appId: "1:815750551646:web:1c48edb729252bd667bccf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // LOGIN FUNCTION (phone + password)
    window.login = async function () {
      let phone = document.getElementById("phone").value;
      let password = document.getElementById("password").value;

      const q = query(
        collection(db, "users"),
        where("phone", "==", phone),
        where("password", "==", password)
      );

      const querySnapshot = await getDocs(q);

      if (!querySnapshot.empty) {
        document.getElementById("msg").innerHTML = "Login success ✔";

        // show exam after login
        document.getElementById("examBox").style.display = "block";

      } else {
        document.getElementById("msg").innerHTML = "Wrong phone or password ❌";
      }
    };

  </script>

</head>

<body>

<h2>Login</h2>

<input id="phone" placeholder="Phone (+251...)"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<hr>

<!-- EXAM AREA (hidden until login) -->
<div id="examBox" style="display:none;">

<h2>Online Exam</h2>

<div id="quiz"></div>
<p id="explanation"></p>

<script>
const questions = [
  {
    question: "Ethiopia is in Africa",
    answer: true,
    explanation: "Correct. Ethiopia is in East Africa."
  }
];

function showQuestion(){
  let q = questions[0];

  document.getElementById("quiz").innerHTML = `
    <h3>${q.question}</h3>
    <button onclick="check(true)">True</button>
    <button onclick="check(false)">False</button>
  `;
}

function check(ans){
  let q = questions[0];

  if(ans == q.answer){
    document.getElementById("explanation").innerHTML =
    "✔ Correct - " + q.explanation;
  } else {
    document.getElementById("explanation").innerHTML =
    "❌ Wrong - " + q.explanation;
  }
}

showQuestion();
</script>

</div>

</body>
</html>
