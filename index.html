<body>

<h2>Login / Register</h2>

<input id="phone" placeholder="Phone number (+251...)">

<button onclick="login()">Send / Login</button>

<p id="msg"></p>

<script type="module">
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const db = getFirestore();

async function login(){
  let phone = document.getElementById("phone").value;

  const querySnapshot = await getDocs(collection(db, "users"));

  let found = false;

  querySnapshot.forEach((doc) => {
    let data = doc.data();

    if(data.phone === phone){
      found = true;
    }
  });

  if(found){
    document.getElementById("msg").innerHTML = "Login success ✔";
  } else {
    document.getElementById("msg").innerHTML = "User not found ❌";
  }
}

window.login = login;
</script>

<hr>

<h2>Online Exam</h2>

<div id="quiz"></div>
<p id="explanation"></p>

<script>
const questions = [
  {
    type: "tf",
    question: "Ethiopia is in Africa",
    answer: true,
    explanation: "Correct. Ethiopia is located in East Africa."
  },
  {
    type: "mcq",
    question: "Capital of Ethiopia?",
    options: ["Addis Ababa", "Nairobi", "Cairo", "Kampala"],
    answer: "Addis Ababa",
    explanation: "Addis Ababa is the capital city."
  }
];

function showQuestion(){
  let q = questions[0];
  let html = "<h3>" + q.question + "</h3>";

  html += `
    <button onclick="check(true)">True</button>
    <button onclick="check(false)">False</button>
  `;

  document.getElementById("quiz").innerHTML = html;
}

function check(ans){
  let q = questions[0];

  if(ans == q.answer){
    document.getElementById("explanation").innerHTML =
    "✔ Correct - " + q.explanation;
  } else {
    document.getElementById("explanation").innerHTML =
    "❌ Wrong - " + q.explanation;
  }
}

showQuestion();
</script>

</body>
</html>
