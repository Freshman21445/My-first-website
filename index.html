<!DOCTYPE html>
<html>

<head>
  <title>Exam System</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      padding: 0;
      margin: 0;
      overflow-y: auto;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    #msg {
      text-align: center;
      font-size: 1.2em;
      margin-bottom: 20px;
      padding: 10px;
      border-radius: 5px;
      min-height: 20px;
      color: white;
      font-weight: bold;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
    }

    #authBox {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
    }

    .auth-box {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
    }

    .auth-box h2 {
      margin-bottom: 30px;
      color: #1e3c72;
      text-align: center;
    }

    .auth-box input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 30px;
      font-size: 1em;
    }

    .auth-box input:focus {
      outline: none;
      border-color: #ff9800;
      box-shadow: 0 0 5px rgba(255, 152, 0, 0.5);
    }

    .auth-box button {
      width: 100%;
      padding: 12px;
      background: #ff9800;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 1em;
      cursor: pointer;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .auth-box button:hover {
      background: #e68900;
    }

    .auth-box p {
      text-align: center;
      margin: 20px 0 10px;
      color: #555;
    }

    #examBox {
      display: none;
      width: 100%;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      background: rgba(255, 255, 255, 0.95);
      padding: 15px 20px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
      position: relative;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      flex: 1;
    }

    .user-profile {
      background: linear-gradient(135deg, #ff9800, #f39c12);
      color: white;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2em;
      box-shadow: 0 3px 10px rgba(255, 152, 0, 0.4);
    }

    .user-details {
      display: flex;
      flex-direction: column;
    }

    .user-details p {
      margin: 0;
      font-size: 0.9em;
      color: #333;
    }

    .user-details .phone {
      font-weight: bold;
      color: #1e3c72;
    }

    .user-details .status {
      font-size: 0.8em;
      color: #ff9800;
    }

    /* Menu button & dropdown */
    .menu-container {
      position: relative;
      display: inline-block;
    }

    .menu-btn {
      background: linear-gradient(135deg, #2c3e50, #34495e);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1.1em;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .menu-btn:hover {
      background: linear-gradient(135deg, #1e2b38, #283847);
      transform: translateY(-2px);
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 50px;
      right: 0;
      background: white;
      min-width: 200px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      z-index: 200;
      overflow: hidden;
    }

    .dropdown-menu button {
      width: 100%;
      padding: 14px 20px;
      text-align: left;
      border: none;
      background: white;
      cursor: pointer;
      font-size: 1em;
      transition: 0.2s;
      font-weight: 500;
      border-bottom: 1px solid #eee;
    }

    .dropdown-menu button:last-child {
      border-bottom: none;
    }

    .dropdown-menu button:hover {
      background: #f9f9f9;
      padding-left: 25px;
    }

    .show {
      display: block;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      margin-top: 30px;
      margin-bottom: 40px;
    }

    .course-card {
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      transition: all 0.3s;
      cursor: pointer;
      border-left: 5px solid #ff9800;
      position: relative;
      overflow: hidden;
    }

    .course-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #ff9800, #f39c12);
    }

    .course-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .course-icon {
      font-size: 3.5em;
      background: rgba(255, 152, 0, 0.15);
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin: 0 auto 15px;
    }

    .course-info h3 {
      color: #1e3c72;
      text-align: center;
      margin-bottom: 8px;
    }

    .course-info p {
      text-align: center;
      color: #666;
      font-size: 0.95em;
    }

    .infographic-fact {
      font-size: 0.85rem;
      background: linear-gradient(135deg, #fff3e0, #ffe0b2);
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
      border-left: 4px solid #ff9800;
      color: #e65100;
      font-weight: 500;
    }

    /* Modal and sections */
    #courseModal .modal-content,
    #materialSection,
    #examSection,
    #premiumFeatureWrapper,
    #contactOwnerSectionWrapper {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-radius: 20px;
    }

    #courseModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 20px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-icon {
      font-size: 4em;
      margin-bottom: 15px;
    }

    .modal-content h2 {
      color: #1e3c72;
      margin-bottom: 10px;
      font-size: 1.8em;
    }

    .modal-content p {
      color: #666;
      margin-bottom: 25px;
      font-size: 1em;
    }

    .modal-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 25px 0;
      flex-wrap: wrap;
    }

    .modal-material-btn, .modal-exam-btn, .modal-close-btn {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1em;
      transition: all 0.3s;
      flex: 1;
      min-width: 120px;
    }

    .modal-material-btn {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
    }

    .modal-material-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
    }

    .modal-exam-btn {
      background: linear-gradient(135deg, #27ae60, #229954);
      color: white;
    }

    .modal-exam-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
    }

    .modal-close-btn {
      background: linear-gradient(135deg, #95a5a6, #7f8c8d);
      color: white;
    }

    .modal-close-btn:hover {
      background: linear-gradient(135deg, #7f8c8d, #6c7a7c);
    }

    #materialSection, #examSection {
      margin-top: 30px;
      padding: 30px;
      display: none;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .material-header, .exam-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .material-header h2, .exam-header h2 {
      color: #1e3c72;
      margin: 0;
      font-size: 1.8em;
    }

    .chapters-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0;
      padding: 15px 0;
    }

    .chapter-btn {
      padding: 12px 20px;
      background: #ecf0f1;
      border: 2px solid #bdc3c7;
      border-radius: 40px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-size: 0.95em;
    }

    .chapter-btn:hover:not(.premium) {
      background: #d5dbdb;
      border-color: #95a5a6;
    }

    .chapter-btn.free {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border: none;
    }

    .chapter-btn.free:hover {
      box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
      transform: translateY(-2px);
    }

    .chapter-btn.premium {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
      border: none;
      position: relative;
    }

    .chapter-btn.premium::after {
      content: "🔒";
      margin-left: 8px;
    }

    .chapter-btn.premium:hover {
      box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
      transform: translateY(-2px);
    }

    .chapter-content {
      background: linear-gradient(135deg, #f8f9fa, #ecf0f1);
      padding: 25px;
      border-radius: 15px;
      margin-top: 20px;
      border-left: 5px solid #3498db;
      line-height: 1.8;
      color: #333;
    }

    .chapter-content.exam-content {
      border-left-color: #27ae60;
    }

    .close-material-btn, .close-exam-btn {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }

    .close-material-btn:hover, .close-exam-btn:hover {
      background: linear-gradient(135deg, #c0392b, #a93226);
      transform: translateY(-2px);
    }

    /* Premium Feature Section */
    #premiumFeatureWrapper {
      margin-top: 30px;
      padding: 30px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(255, 243, 224, 0.95));
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(243, 156, 18, 0.2);
      border-top: 3px solid #f39c12;
    }

    #premiumFeatureWrapper h2 {
      color: #1e3c72;
      margin-bottom: 25px;
      text-align: center;
      font-size: 1.8em;
    }

    .payment-method {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 15px;
      border-left: 5px solid #ff9800;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      transition: all 0.3s;
    }

    .payment-method:hover {
      box-shadow: 0 5px 15px rgba(255, 152, 0, 0.2);
      transform: translateX(5px);
    }

    .payment-method h3 {
      color: #1e3c72;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .payment-method p {
      margin: 8px 0;
      color: #555;
      font-size: 0.95em;
    }

    .payment-account-holder {
      font-weight: bold;
      color: #ff9800;
      font-size: 1.1em;
    }

    .copy-btn {
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      border: none;
      padding: 6px 14px;
      margin-left: 10px;
      cursor: pointer;
      border-radius: 20px;
      font-weight: bold;
      transition: all 0.3s;
      font-size: 0.9em;
    }

    .copy-btn:hover {
      background: linear-gradient(135deg, #0056b3, #004085);
      transform: scale(1.05);
    }

    .payment-instruction {
      background: #e3f2fd;
      padding: 20px;
      border-radius: 15px;
      margin: 20px 0;
      border-left: 5px solid #2196f3;
      color: #1565c0;
      line-height: 1.8;
    }

    .telegram-handle {
      font-family: monospace;
      background: #fff3e0;
      padding: 8px 12px;
      border-radius: 5px;
      color: #e65100;
      font-weight: bold;
      font-size: 1.05em;
    }

    .approval-btn {
      background: linear-gradient(135deg, #28a745, #1e7e34);
      color: white;
      border: none;
      padding: 14px 30px;
      cursor: pointer;
      margin-top: 20px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.05em;
      transition: all 0.3s;
      width: 100%;
      display: block;
    }

    .approval-btn:hover {
      background: linear-gradient(135deg, #1e7e34, #155724);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
    }

    .close-premium-btn {
      background: #7f8c8d;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 15px;
      display: block;
      width: 100%;
      font-weight: bold;
      transition: all 0.3s;
    }

    .close-premium-btn:hover {
      background: #6c7a7c;
      transform: translateY(-2px);
    }

    /* Contact Owner Section */
    #contactOwnerSectionWrapper {
      margin-top: 30px;
      padding: 30px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(224, 242, 254, 0.95));
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(52, 152, 219, 0.2);
      border-top: 3px solid #3498db;
      text-align: center;
    }

    #contactOwnerSectionWrapper h2 {
      color: #1e3c72;
      margin-bottom: 25px;
      font-size: 1.8em;
    }

    .contact-item {
      background: white;
      padding: 18px;
      margin-bottom: 15px;
      border-radius: 12px;
      border-left: 5px solid #3498db;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      transition: all 0.3s;
    }

    .contact-item:hover {
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
      transform: translateX(5px);
    }

    .contact-item p {
      margin: 0;
      color: #555;
      font-size: 0.98em;
    }

    .contact-label {
      font-weight: bold;
      color: #1e3c72;
      display: block;
      margin-bottom: 5px;
    }

    .close-contact-btn {
      background: #95a5a6;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .close-contact-btn:hover {
      background: #7f8c8d;
      transform: translateY(-2px);
    }

    .hidden {
      display: none;
    }

    .premium-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8em;
      font-weight: bold;
      margin-left: 10px;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      h1 {
        font-size: 1.8em;
      }

      .dashboard-header {
        flex-direction: column;
        gap: 15px;
      }

      .user-info {
        width: 100%;
        justify-content: center;
      }

      .courses-grid {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
      }

      .modal-content {
        padding: 25px;
        max-width: 90%;
      }

      .modal-buttons {
        flex-direction: column;
      }

      .modal-material-btn, .modal-exam-btn, .modal-close-btn {
        min-width: unset;
      }

      .payment-method {
        padding: 15px;
      }

      .chapters-list {
        flex-direction: column;
      }

      .chapter-btn {
        width: 100%;
      }

      #materialSection, #examSection {
        padding: 20px;
      }

      .dropdown-menu {
        right: -20px;
      }
    }
  </style>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc } 
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAavkqPwNgzo3UASsz-feaQvTjobxwkj-s",
      authDomain: "student-quiz-platform-9439a.firebaseapp.com",
      projectId: "student-quiz-platform-9439a",
      storageBucket: "student-quiz-platform-9439a.firebasestorage.app",
      messagingSenderId: "815750551646",
      appId: "1:815750551646:web:1c48edb729252bd667bccf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = null;

    window.login = async function () {
      let phone = document.getElementById("loginPhone").value;
      let password = document.getElementById("loginPassword").value;
      
      if (!phone || !password) {
        document.getElementById("msg").innerHTML = "❌ Please fill all fields";
        return;
      }

      const q = query(collection(db, "users"), where("phone", "==", phone), where("password", "==", password));
      const snap = await getDocs(q);
      
      if (!snap.empty) {
        currentUser = snap.docs[0].data();
        currentUser.docId = snap.docs[0].id;
        currentUser.phone = phone;
        
        document.getElementById("msg").innerHTML = "✔ Welcome! Login successful";
        document.getElementById("authBox").style.display = "none";
        document.getElementById("examBox").style.display = "block";
        updateUserProfile();
      } else {
        document.getElementById("msg").innerHTML = "❌ Wrong phone or password";
      }
    };

    window.register = async function () {
      let phone = document.getElementById("regPhone").value;
      let password = document.getElementById("regPassword").value;
      
      if (!phone || !password) {
        document.getElementById("msg").innerHTML = "❌ Please fill all fields";
        return;
      }

      const q = query(collection(db, "users"), where("phone", "==", phone));
      const snap = await getDocs(q);

      if (!snap.empty) {
        document.getElementById("msg").innerHTML = "❌ Phone number already registered";
        return;
      }

      await addDoc(collection(db, "users"), { 
        phone, 
        password,
        premiumStatus: false,
        paymentApproved: false,
        createdAt: new Date()
      });

      document.getElementById("msg").innerHTML = "✔ Registered succes
