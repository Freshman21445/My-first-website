<!DOCTYPE html>
<html>
<head>
  <title>Exam</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; width:100%; overflow-x:hidden; }
    body {
      font-family:'Segoe UI',Arial,sans-serif;
      background-image:url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format');
      background-size:cover; background-position:center;
      background-repeat:no-repeat; background-attachment:fixed;
      min-height:100vh; overflow-y:auto; position:relative;
    }
    body::before {
      content:""; position:fixed; top:0; left:0;
      width:100%; height:100%; background:rgba(0,0,0,0.60); z-index:0;
    }
    .container {
      position:relative; z-index:1; max-width:800px;
      margin:0 auto; padding:20px; min-height:100vh;
    }
    h1 {
      text-align:center; color:white; margin-bottom:20px;
      font-size:1.6em; text-shadow:2px 2px 6px rgba(0,0,0,0.6); padding-top:20px;
    }
    .card {
      background:rgba(255,255,255,0.97); border-radius:20px;
      padding:32px; box-shadow:0 10px 30px rgba(0,0,0,0.25); margin-bottom:24px;
    }
    #courseTitle {
      color:#1e3c72; font-size:1.15em; font-weight:bold;
      margin-bottom:20px; text-align:center;
    }

    /* MODE SELECTION */
    #modeSelection { text-align:center; }
    #modeSelection h2 { color:#1e3c72; margin-bottom:10px; font-size:1.3em; }
    #modeSelection p  { color:#666; margin-bottom:24px; font-size:0.97em; }
    .mode-btns { display:flex; gap:18px; justify-content:center; flex-wrap:wrap; }
    .mode-btn {
      padding:16px 36px; border:none; border-radius:30px;
      font-size:1.05em; font-weight:bold; cursor:pointer; transition:all 0.3s;
    }
    .mode-btn.instant { background:linear-gradient(135deg,#ff9800,#e68900); color:white; }
    .mode-btn.instant:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(255,152,0,0.45); }
    .mode-btn.finish  { background:linear-gradient(135deg,#27ae60,#229954); color:white; }
    .mode-btn.finish:hover  { transform:translateY(-3px); box-shadow:0 8px 20px rgba(39,174,96,0.45); }

    /* LOADING */
    #loadingDiv {
      text-align:center; padding:30px; color:#888; display:none;
    }
    .loading-spinner {
      width:40px; height:40px; border:4px solid #eee;
      border-top:4px solid #ff9800; border-radius:50%;
      animation:spin 0.8s linear infinite; margin:0 auto 14px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* QUESTIONS */
    #questionsDiv {
      max-height:65vh; overflow-y:auto; padding-right:6px;
      scrollbar-width:thin; scrollbar-color:#ff9800 #f0f0f0;
    }
    #questionsDiv::-webkit-scrollbar { width:6px; }
    #questionsDiv::-webkit-scrollbar-track { background:#f0f0f0; border-radius:10px; }
    #questionsDiv::-webkit-scrollbar-thumb { background:#ff9800; border-radius:10px; }
    .question { margin-bottom:10px; }
    .question-text {
      font-size:1.08em; color:#1e3c72; margin-bottom:14px; line-height:1.6;
    }
    .options-list { display:flex; flex-direction:column; gap:10px; }
    .option {
      padding:12px 20px; border:2px solid #ddd; border-radius:30px;
      background:#f9f9f9; font-size:0.97em; cursor:pointer;
      text-align:left; transition:all 0.2s; font-weight:500; color:#333;
    }
    .option:hover { background:#fff3e0; border-color:#ff9800; color:#e65100; }
    .option.correct { background:#e8f5e9; border-color:#27ae60; color:#1b5e20; }
    .option.wrong   { background:#fce4ec; border-color:#e91e63; color:#880e4f; }
    .option:disabled { cursor:not-allowed; }

    /* EXPLANATION BOX */
    .explanation-box {
      margin-top:14px; padding:14px 18px; background:#e8f5e9;
      border-left:4px solid #27ae60; border-radius:10px;
      color:#1b5e20; font-size:0.92em; line-height:1.6; display:none;
    }
    .explanation-box.wrong-exp {
      background:#fff3e0; border-left-color:#ff9800; color:#e65100;
    }

    /* PROGRESS */
    .progress-bar-wrap {
      background:#eee; border-radius:30px; height:8px; margin-bottom:20px; overflow:hidden;
    }
    .progress-bar { height:8px; border-radius:30px; background:linear-gradient(90deg,#ff9800,#f39c12); transition:width 0.4s; }
    .progress-label { color:#888; font-size:0.88em; margin-bottom:8px; text-align:right; }

    /* FINISH BTN */
    #finishBtn {
      display:none; width:100%; padding:14px; background:linear-gradient(135deg,#27ae60,#229954);
      color:white; border:none; border-radius:30px; font-size:1.05em;
      font-weight:bold; cursor:pointer; margin-top:20px; transition:all 0.3s;
    }
    #finishBtn:hover { background:linear-gradient(135deg,#1e7e34,#155724); transform:translateY(-2px); }

    /* RESULT */
    #result {
      text-align:center; font-size:1.1em; color:#1e3c72; line-height:2;
    }
    #result button {
      margin-top:16px; padding:12px 30px; background:linear-gradient(135deg,#ff9800,#e68900);
      color:white; border:none; border-radius:30px; font-size:1em;
      font-weight:bold; cursor:pointer; transition:all 0.3s;
    }
    #result button:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(255,152,0,0.4); }

    /* REVIEW SECTION */
    #reviewSection { display:none; margin-top:20px; }
    #reviewSection h3 { color:#1e3c72; margin-bottom:14px; font-size:1.1em; }
    .review-item {
      background:#f9f9f9; border:1px solid #eee; border-radius:14px;
      padding:16px; margin-bottom:12px;
    }
    .review-item .r-q { font-weight:700; color:#1e3c72; margin-bottom:8px; font-size:0.97em; line-height:1.4; }
    .review-item .r-ans { font-size:0.9em; margin-bottom:4px; }
    .review-item .r-correct { color:#27ae60; font-weight:700; }
    .review-item .r-wrong   { color:#e91e63; font-weight:700; }
    .review-item .r-exp { color:#888; font-size:0.88em; margin-top:6px; font-style:italic; }

    /* BACK LINK */
    .back-link {
      display:inline-block; margin-bottom:18px; color:rgba(255,255,255,0.85);
      text-decoration:none; font-weight:bold; font-size:0.97em;
      background:rgba(255,255,255,0.15); padding:8px 20px; border-radius:30px;
      backdrop-filter:blur(4px); transition:all 0.2s;
    }
    .back-link:hover { background:rgba(255,255,255,0.25); color:white; }

    /* Question type badge */
    .q-type-badge {
      display:inline-block; padding:3px 10px; border-radius:20px;
      font-size:0.75em; font-weight:700; margin-bottom:10px;
    }
    .q-type-badge.mc  { background:#e3f2fd; color:#1565c0; }
    .q-type-badge.tf  { background:#f3e5f5; color:#6a1b9a; }

    @media(max-width:600px){
      .card { padding:20px; }
      h1 { font-size:1.25em; }
      .mode-btns { flex-direction:column; align-items:center; }
      .mode-btn { width:100%; max-width:280px; }
    }
  </style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">← Back to Dashboard</a>
  <h1>📚 Online Exam System</h1>

  <div class="card">
    <div id="courseTitle"></div>

    <!-- LOADING -->
    <div id="loadingDiv">
      <div class="loading-spinner"></div>
      <p>Loading questions...</p>
    </div>

    <!-- MODE SELECTION -->
    <div id="modeSelection">
      <h2>Choose Exam Mode</h2>
      <p>How would you like to receive feedback on your answers?</p>
      <div class="mode-btns">
        <button class="mode-btn instant" onclick="startExam('instant')">⚡ Instant Feedback</button>
        <button class="mode-btn finish"  onclick="startExam('finish')">✅ Submit at End</button>
      </div>
    </div>

    <!-- QUESTIONS -->
    <div id="questionsDiv"></div>

    <!-- PROGRESS -->
    <div id="progressWrap" style="display:none;">
      <p class="progress-label" id="progressLabel"></p>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    </div>

    <!-- FINISH -->
    <button id="finishBtn" onclick="finishExam()">📋 Finish &amp; See Results</button>

    <!-- RESULT -->
    <div id="result"></div>

    <!-- REVIEW -->
    <div id="reviewSection">
      <h3>📋 Review Your Answers</h3>
      <div id="reviewList"></div>
    </div>
  </div>
</div>

      low: [
        {q:'Ethics deals with right and wrong.', options:['True','False'], answer:'True', type:'true_false', explanation:'Ethics is the branch of philosophy concerned with moral principles that govern right and wrong conduct.'},
        {q:'Virtue ethics was developed by:', options:['Kant','Mill','Aristotle','Plato'], answer:'Aristotle', type:'multiple_choice', explanation:'Aristotle developed virtue ethics, focusing on character and virtues rather than rules or consequences.'},
        {q:'The Golden Rule says "Do unto others as you would have them do unto you."', options:['True','False'], answer:'True', type:'true_false', explanation:'The Golden Rule is a universal ethical principle found across many cultures and religions.'}
      ],
      medium: [
        {q:'Utilitarianism judges actions by their consequences for overall happiness.', options:['True','False'], answer:'True', type:'true_false', explanation:'Utilitarianism (Mill, Bentham) holds that the right action maximizes overall happiness or utility.'},
        {q:'The categorical imperative is from:', options:['Aristotle','Kant','Mill','Hume'], answer:'Kant', type:'multiple_choice', explanation:'Immanuel Kant\'s categorical imperative is the central principle of his deontological ethics.'},
        {q:'Moral relativism holds that moral standards are relative to culture.', options:['True','False'], answer:'True', type:'true_false', explanation:'Moral relativism is the view that moral judgments are not universally valid but vary by culture or individual.'}
      ],
      difficult: [
        {q:'The trolley problem illustrates tension between deontological and consequentialist ethics.', options:['True','False'], answer:'True', type:'true_false', explanation:'The trolley problem pits the deontological rule against killing vs. the consequentialist goal of minimizing harm.'},
        {q:"Rawls' veil of ignorance is designed to derive principles of justice without bias.", options:['True','False'], answer:'True', type:'true_false', explanation:"Rawls' veil of ignorance asks us to design society's rules without knowing our place in it, ensuring impartiality."},
        {q:'Care ethics (Gilligan) prioritizes:', options:['Universal rules','Consequences for society','Relationships and context','Individual rights only'], answer:'Relationships and context', type:'multiple_choice', explanation:'Carol Gilligan\'s care ethics emphasizes relationships, empathy, and context over abstract universal principles.'}
      ]
    }
  };

  function getFallback(c, l) {
    if (fallbackQuestions[c] && fallbackQuestions[c][l]) return fallbackQuestions[c][l];
    return [
      {q:'What is the capital of France?', options:['Berlin','Madrid','Paris','Lisbon'], answer:'Paris', type:'multiple_choice', explanation:'Paris is the capital and largest city of France.'},
      {q:'Mars is known as the Red Planet.', options:['True','False'], answer:'True', type:'true_false', explanation:'Mars appears red due to iron oxide (rust) on its surface.'},
      {q:'William Shakespeare wrote Romeo and Juliet.', options:['True','False'], answer:'True', type:'true_false', explanation:'Romeo and Juliet is one of Shakespeare\'s most famous tragic plays.'}
    ];
  }

  /* ── LOAD QUESTIONS FROM FIRESTORE FIRST ── */
  async function loadQuestions() {
    document.getElementById('loadingDiv').style.display = 'block';
    document.getElementById('modeSelection').style.display = 'none';
    try {
      const q = query(
        collection(db, 'adminExams'),
        where('course', '==', course),
        where('chapter', '==', chapter),
        where('difficulty', '==', level)
      );
      const snap = await getDocs(q);
      if (!snap.empty) {
        questions = snap.docs.map(function(doc) {
          var d = doc.data();
          var opts = d.type === 'true_false' ? ['True','False'] : (d.options || []);
          return { q: d.question, options: opts, answer: d.answer, type: d.type || 'multiple_choice', explanation: d.explanation || '' };
        });
      } else {
        questions = getFallback(course, level);
      }
    } catch(e) {
      questions = getFallback(course, level);
    }
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('modeSelection').style.display = 'block';
  }

  loadQuestions();

  function updateProgress() {
    var total = questions.length;
    var done  = Math.min(currentQ, total);
    document.getElementById('progressLabel').textContent = 'Question ' + done + ' of ' + total;
    document.getElementById('progressBar').style.width = Math.round((done / total) * 100) + '%';
  }

  window.startExam = function(selectedMode) {
    mode = selectedMode;
    document.getElementById('modeSelection').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'block';
    answers   = new Array(questions.length).fill(null);
    currentQ  = 0;
    showQuestion(0);
  };

  function showQuestion(index) {
    updateProgress();
    var qDiv = document.getElementById('questionsDiv');
    qDiv.innerHTML = '';
    document.getElementById('finishBtn').style.display = 'none';
    document.getElementById('result').innerHTML = '';
    document.getElementById('reviewSection').style.display = 'none';

    if (index >= questions.length) {
      if (mode === 'finish') {
        document.getElementById('finishBtn').style.display = 'block';
      } else {
        finishExam();
      }
      return;
    }

    var q    = questions[index];
    var wrap = document.createElement('div');
    wrap.className = 'question';

    /* type badge */
    var badge = document.createElement('span');
    badge.className = 'q-type-badge ' + (q.type === 'true_false' ? 'tf' : 'mc');
    badge.textContent = q.type === 'true_false' ? 'True / False' : 'Multiple Choice';
    wrap.appendChild(badge);

    var qText = document.createElement('div');
    qText.className = 'question-text';
    qText.innerHTML = '<strong>Q' + (index + 1) + ':</strong> ' + q.q;
    wrap.appendChild(qText);

    var optList = document.createElement('div');
    optList.className = 'options-list';

    q.options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.textContent = opt;
      btn.className   = 'option';
      btn.onclick = function() { selectAnswer(opt, index, wrap); };
      optList.appendChild(btn);
    });

    wrap.appendChild(optList);

    /* explanation box (hidden initially) */
    var expBox = document.createElement('div');
    expBox.className = 'explanation-box';
    expBox.id = 'exp_' + index;
    wrap.appendChild(expBox);

    qDiv.appendChild(wrap);
  }

  function selectAnswer(selected, index, wrap) {
    answers[index] = selected;
    var correct = questions[index].answer;
    var btns = wrap.querySelectorAll('.option');
    btns.forEach(function(b) {
      b.disabled = true;
      if (b.textContent === correct) b.classList.add('correct');
      else if (b.textContent === selected && selected !== correct) b.classList.add('wrong');
    });

    /* show explanation in instant mode */
    if (mode === 'instant' && questions[index].explanation) {
      var expBox = wrap.querySelector('.explanation-box');
      if (expBox) {
        expBox.style.display = 'block';
        var isCorrect = selected === correct;
        expBox.className = 'explanation-box' + (isCorrect ? '' : ' wrong-exp');
        expBox.innerHTML = (isCorrect ? '✅ ' : '❌ ') + '<strong>' + (isCorrect ? 'Correct!' : 'Incorrect.') + '</strong> ' + questions[index].explanation;
      }
    }

    var delay = mode === 'instant' ? 1400 : 600;
    setTimeout(function() {
      currentQ++;
      showQuestion(currentQ);
    }, delay);
  }

  window.finishExam = function() {
    document.getElementById('questionsDiv').innerHTML = '';
    document.getElementById('finishBtn').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';

    var correct = 0;
    answers.forEach(function(a, i) {
      if (a === questions[i].answer) correct++;
    });
    var total      = questions.length;
    var percentage = Math.round((correct / total) * 100);
    var emoji      = percentage >= 80 ? '🌟' : percentage >= 50 ? '👍' : '📖';

    document.getElementById('result').innerHTML =
      '<p style="font-size:2.5em;margin-bottom:10px;">' + emoji + '</p>' +
      '<p><strong>You got ' + correct + ' / ' + total + ' correct</strong></p>' +
      '<p style="font-size:1.3em;color:#ff9800;font-weight:bold;">' + percentage + '%</p>' +
      '<button onclick="location.reload()">🔁 Try Again</button>' +
      '<br><a href="index.html" style="display:inline-block;margin-top:12px;color:#1e3c72;font-weight:bold;">← Back to Dashboard</a>';

    /* show review */
    if (mode === 'finish') {
      var reviewSection = document.getElementById('reviewSection');
      var reviewList    = document.getElementById('reviewList');
      reviewList.innerHTML = '';
      questions.forEach(function(q, i) {
        var userAns = answers[i];
        var isRight = userAns === q.answer;
        var div = document.createElement('div');
        div.className = 'review-item';
        div.innerHTML =
          '<div class="r-q">Q' + (i+1) + ': ' + q.q + '</div>' +
          '<div class="r-ans ' + (isRight ? 'r-correct' : 'r-wrong') + '">' +
            (isRight ? '✅' : '❌') + ' Your answer: ' + (userAns || 'Not answered') +
          '</div>' +
          (!isRight ? '<div class="r-ans r-correct">✔ Correct: ' + q.answer + '</div>' : '') +
          (q.explanation ? '<div class="r-exp">💡 ' + q.explanation + '</div>' : '');
        reviewList.appendChild(div);
      });
      reviewSection.style.display = 'block';
    }
  };
</script>
</body>
