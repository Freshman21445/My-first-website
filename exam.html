<!DOCTYPE html>
<html>
<head>
  <title>Exam</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; width:100%; overflow-x:hidden; }
    body {
      font-family:'Segoe UI',Arial,sans-serif;
      background-image:url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format');
      background-size:cover; background-position:center;
      background-repeat:no-repeat; background-attachment:fixed;
      min-height:100vh; overflow-y:auto; position:relative;
    }
    body::before {
      content:""; position:fixed; top:0; left:0;
      width:100%; height:100%; background:rgba(0,0,0,0.60); z-index:0;
    }
    .container {
      position:relative; z-index:1; max-width:800px;
      margin:0 auto; padding:20px; min-height:100vh;
    }
    h1 {
      text-align:center; color:white; margin-bottom:20px;
      font-size:1.6em; text-shadow:2px 2px 6px rgba(0,0,0,0.6); padding-top:20px;
    }
    .card {
      background:rgba(255,255,255,0.97); border-radius:20px;
      padding:32px; box-shadow:0 10px 30px rgba(0,0,0,0.25); margin-bottom:24px;
    }
    #courseTitle {
      color:#1e3c72; font-size:1.15em; font-weight:bold;
      margin-bottom:20px; text-align:center;
    }

    /* MODE SELECTION */
    #modeSelection { text-align:center; }
    #modeSelection h2 { color:#1e3c72; margin-bottom:10px; font-size:1.3em; }
    #modeSelection p  { color:#666; margin-bottom:24px; font-size:0.97em; }
    .mode-btns { display:flex; gap:18px; justify-content:center; flex-wrap:wrap; }
    .mode-btn {
      padding:16px 36px; border:none; border-radius:30px;
      font-size:1.05em; font-weight:bold; cursor:pointer; transition:all 0.3s;
    }
    .mode-btn.instant { background:linear-gradient(135deg,#ff9800,#e68900); color:white; }
    .mode-btn.instant:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(255,152,0,0.45); }
    .mode-btn.finish  { background:linear-gradient(135deg,#27ae60,#229954); color:white; }
    .mode-btn.finish:hover  { transform:translateY(-3px); box-shadow:0 8px 20px rgba(39,174,96,0.45); }

    /* LOADING */
    #loadingDiv {
      text-align:center; padding:30px; color:#888; display:none;
    }
    .loading-spinner {
      width:40px; height:40px; border:4px solid #eee;
      border-top:4px solid #ff9800; border-radius:50%;
      animation:spin 0.8s linear infinite; margin:0 auto 14px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* QUESTIONS */
    #questionsDiv {
      max-height:65vh; overflow-y:auto; padding-right:6px;
      scrollbar-width:thin; scrollbar-color:#ff9800 #f0f0f0;
    }
    #questionsDiv::-webkit-scrollbar { width:6px; }
    #questionsDiv::-webkit-scrollbar-track { background:#f0f0f0; border-radius:10px; }
    #questionsDiv::-webkit-scrollbar-thumb { background:#ff9800; border-radius:10px; }
    .question { margin-bottom:10px; }
    .question-text {
      font-size:1.08em; color:#1e3c72; margin-bottom:14px; line-height:1.6;
    }
    .options-list { display:flex; flex-direction:column; gap:10px; }
    .option {
      padding:12px 20px; border:2px solid #ddd; border-radius:30px;
      background:#f9f9f9; font-size:0.97em; cursor:pointer;
      text-align:left; transition:all 0.2s; font-weight:500; color:#333;
    }
    .option:hover { background:#fff3e0; border-color:#ff9800; color:#e65100; }
    .option.correct { background:#e8f5e9; border-color:#27ae60; color:#1b5e20; }
    .option.wrong   { background:#fce4ec; border-color:#e91e63; color:#880e4f; }
    .option:disabled { cursor:not-allowed; }

    /* EXPLANATION BOX */
    .explanation-box {
      margin-top:14px; padding:14px 18px; background:#e8f5e9;
      border-left:4px solid #27ae60; border-radius:10px;
      color:#1b5e20; font-size:0.92em; line-height:1.6; display:none;
    }
    .explanation-box.wrong-exp {
      background:#fff3e0; border-left-color:#ff9800; color:#e65100;
    }

    /* PROGRESS */
    .progress-bar-wrap {
      background:#eee; border-radius:30px; height:8px; margin-bottom:20px; overflow:hidden;
    }
    .progress-bar { height:8px; border-radius:30px; background:linear-gradient(90deg,#ff9800,#f39c12); transition:width 0.4s; }
    .progress-label { color:#888; font-size:0.88em; margin-bottom:8px; text-align:right; }

    /* FINISH BTN */
    #finishBtn {
      display:none; width:100%; padding:14px; background:linear-gradient(135deg,#27ae60,#229954);
      color:white; border:none; border-radius:30px; font-size:1.05em;
      font-weight:bold; cursor:pointer; margin-top:20px; transition:all 0.3s;
    }
    #finishBtn:hover { background:linear-gradient(135deg,#1e7e34,#155724); transform:translateY(-2px); }

    /* SELECTED (finish mode) */
    .option.selected { background:#e3f2fd; border-color:#1565c0; color:#0d47a1; }

    /* EXPLANATION TOGGLE BUTTON */
    .exp-toggle-btn {
      display:none; margin-top:12px; padding:7px 18px;
      background:rgba(30,60,114,0.08); border:1.5px solid #1e3c72;
      border-radius:20px; color:#1e3c72; font-size:0.85em; font-weight:600;
      cursor:pointer; transition:all 0.2s;
    }
    .exp-toggle-btn:hover { background:#1e3c72; color:white; }
    .exp-toggle-btn.visible { display:inline-block; }

    /* RESULT */
    #result {
      text-align:center; font-size:1.1em; color:#1e3c72; line-height:2;
    }
    #result .result-btn {
      margin-top:12px; padding:12px 30px; background:linear-gradient(135deg,#ff9800,#e68900);
      color:white; border:none; border-radius:30px; font-size:1em;
      font-weight:bold; cursor:pointer; transition:all 0.3s; display:inline-block;
    }
    #result .result-btn:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(255,152,0,0.4); }
    #result .review-btn {
      margin-top:12px; margin-left:10px; padding:12px 30px;
      background:linear-gradient(135deg,#1e3c72,#2a5298);
      color:white; border:none; border-radius:30px; font-size:1em;
      font-weight:bold; cursor:pointer; transition:all 0.3s; display:inline-block;
    }
    #result .review-btn:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(30,60,114,0.4); }

    /* REVIEW SECTION */
    #reviewSection { display:none; margin-top:24px; }
    #reviewSection h3 { color:#1e3c72; margin-bottom:14px; font-size:1.1em; }

    /* BACK LINK */
    .back-link {
      display:inline-block; margin-bottom:18px; color:rgba(255,255,255,0.85);
      text-decoration:none; font-weight:bold; font-size:0.97em;
      background:rgba(255,255,255,0.15); padding:8px 20px; border-radius:30px;
      backdrop-filter:blur(4px); transition:all 0.2s;
    }
    .back-link:hover { background:rgba(255,255,255,0.25); color:white; }

    /* Question type badge */
    .q-type-badge {
      display:inline-block; padding:3px 10px; border-radius:20px;
      font-size:0.75em; font-weight:700; margin-bottom:10px;
    }
    .q-type-badge.mc  { background:#e3f2fd; color:#1565c0; }
    .q-type-badge.tf  { background:#f3e5f5; color:#6a1b9a; }

    @media(max-width:600px){
      .card { padding:20px; }
      h1 { font-size:1.25em; }
      .mode-btns { flex-direction:column; align-items:center; }
      .mode-btn { width:100%; max-width:280px; }
    }
  </style>
</head>
<body>
<div class="container">
  <a class="back-link" id="backLink" href="#" onclick="history.back(); return false;">← Back to Chapters</a>
  <h1>📚 Online Exam System</h1>

  <div class="card">
    <div id="courseTitle"></div>

    <!-- LOADING -->
    <div id="loadingDiv">
      <div class="loading-spinner"></div>
      <p>Loading questions...</p>
    </div>

    <!-- MODE SELECTION -->
    <div id="modeSelection">
      <h2>Choose Exam Mode</h2>
      <p>How would you like to receive feedback on your answers?</p>
      <div class="mode-btns">
        <button class="mode-btn instant" onclick="startExam('instant')">⚡ Instant Feedback</button>
        <button class="mode-btn finish"  onclick="startExam('finish')">✅ After Finishing</button>
      </div>
    </div>

    <!-- QUESTIONS -->
    <div id="questionsDiv"></div>

    <!-- PROGRESS -->
    <div id="progressWrap" style="display:none;">
      <p class="progress-label" id="progressLabel"></p>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    </div>

    <!-- FINISH -->
    <button id="finishBtn" onclick="finishExam()">📋 Finish &amp; See Results</button>

    <!-- RESULT -->
    <div id="result"></div>

    <!-- REVIEW -->
    <div id="reviewSection">
      <h3>📋 Review Your Answers</h3>
      <div id="reviewList"></div>
    </div>
  </div>
</div>
