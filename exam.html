<!DOCTYPE html>
<html>
<head>
  <title>Exam</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; width:100%; overflow-x:hidden; }
    body {
      font-family:'Segoe UI',Arial,sans-serif;
      background-image:url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format');
      background-size:cover; background-position:center;
      background-repeat:no-repeat; background-attachment:fixed;
      min-height:100vh; overflow-y:auto; position:relative;
    }
    body::before {
      content:""; position:fixed; top:0; left:0;
      width:100%; height:100%; background:transparent; z-index:0;
    }
    .container {
      position:relative; z-index:1; width:100%; max-width:none;
      margin:0; padding:8px 0; min-height:100vh;
    }
    .card-wrap {
      max-width:none; width:100%; margin:0;
    }
    h1 {
      text-align:center; color:white; margin-bottom:20px;
      font-size:1.6em; text-shadow:2px 2px 6px rgba(0,0,0,0.6); padding-top:20px;
    }
    .card {
      background:#f5f2ee; border-radius:0;
      padding:16px 0; box-shadow:0 10px 30px rgba(0,0,0,0.12); margin-bottom:24px;
      width:100%; max-width:none; margin-left:0; margin-right:0;
    }
    #courseTitle {
      color:#1e3c72; font-size:1.15em; font-weight:bold;
      margin-bottom:20px; text-align:center;
    }

    /* MODE SELECTION */
    #modeSelection { text-align:center; }
    #modeSelection h2 { color:#1e3c72; margin-bottom:10px; font-size:1.3em; }
    #modeSelection p  { color:#666; margin-bottom:24px; font-size:0.97em; }
    .mode-btns { display:flex; gap:18px; justify-content:center; flex-wrap:wrap; }
    .mode-btn {
      padding:16px 36px; border:none; border-radius:30px;
      font-size:1.05em; font-weight:bold; cursor:pointer; transition:all 0.3s;
    }
    .mode-btn.instant { background:linear-gradient(135deg,#ff9800,#e68900); color:white; }
    .mode-btn.instant:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(255,152,0,0.45); }
    .mode-btn.finish  { background:linear-gradient(135deg,#27ae60,#229954); color:white; }
    .mode-btn.finish:hover  { transform:translateY(-3px); box-shadow:0 8px 20px rgba(39,174,96,0.45); }

    /* LOADING */
    #loadingDiv {
      text-align:center; padding:30px; color:#888; display:none;
    }
    .loading-spinner {
      width:40px; height:40px; border:4px solid #eee;
      border-top:4px solid #ff9800; border-radius:50%;
      animation:spin 0.8s linear infinite; margin:0 auto 14px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* QUESTIONS */
    #questionsDiv {
      padding-right:0;
    }
    .question {
      background:#faf8f5; margin-bottom:22px;
      border-radius:0; overflow:hidden;
      box-shadow:none; border:none; width:100%;
    }
    .q-img { width:100%; max-height:260px; object-fit:contain; border-radius:8px; margin:0 0 10px; display:block; padding:0 16px; box-sizing:border-box; }
    .opt-img { width:100%; max-height:120px; object-fit:contain; border-radius:6px; margin-top:6px; display:block; }
    .exp-img { width:100%; max-height:200px; object-fit:contain; border-radius:8px; margin-top:10px; display:block; }
    .q-num-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 8px 6px; gap:8px;
    }
    .q-num { font-size:1.25em; font-weight:800; color:#222; flex:1; }
    .q-num-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .q-divider { height:1px; background:#333; margin:0; }
    .question-text {
      font-size:1em; color:#222; line-height:1.5;
      padding:8px 8px 12px; margin:0;
    }
    .options-list { display:flex; flex-direction:column; }
    .hint-btn {
      display:none; padding:10px 16px; background:none;
      border:none; border-top:1px solid #eee;
      color:#7c4dff; font-size:0.9em; font-weight:600;
      cursor:pointer; width:100%; text-align:left;
    }
    .hint-btn:hover { background:#f5f0ff; }
    .hint-btn.visible { display:block; }
    .hint-box {
      margin:0; padding:10px 12px; background:#f5f2ee;
      color:#333; font-size:0.92em; line-height:1.6; display:none;
    }
    .option {
      padding:12px 0; border:none; border-top:1px solid #ede9e3;
      background:#faf8f5; font-size:0.97em; cursor:pointer;
      text-align:left; transition:background 0.15s; font-weight:400;
      color:#333; display:flex; align-items:center; gap:2px; width:100%;
      border-radius:0;
    }
    .option .radio-circle {
      width:20px; height:20px; border-radius:50%; border:2px solid #bbb;
      flex-shrink:0; display:inline-block; box-sizing:border-box;
      background:white; transition:all 0.15s;
    }
    .option:hover { background:#ede9e3; }
    .option:hover .radio-circle { border-color:#888; }
    .option.correct { background:#4caf50; color:#fff; }
    .option.correct .radio-circle { border-color:#fff; background:#fff; }
    .option.wrong   { background:#ef9a9a; color:#333; }
    .option.wrong .radio-circle { border-color:#c62828; background:#c62828; }
    .option.selected { background:#e3f2fd; color:#0d47a1; }
    .option.selected .radio-circle { border-color:#0d47a1; background:#0d47a1; }
    .option:disabled { cursor:not-allowed; }

    /* EXPLANATION BOX */
    .explanation-box {
      margin:0; padding:10px 12px; background:#f5f2ee;
      color:#333; font-size:0.92em; line-height:1.6; display:none;
    }
    .explanation-box.wrong-exp { background:#f5f2ee; }

    /* PROGRESS */
    .progress-bar-wrap {
      background:#eee; border-radius:30px; height:8px; margin-bottom:20px; overflow:hidden;
    }
    .progress-bar { height:8px; border-radius:30px; background:linear-gradient(90deg,#ff9800,#f39c12); transition:width 0.4s; }
    .progress-label { color:#888; font-size:0.88em; margin-bottom:8px; text-align:right; }

    /* FINISH BTN */
    #finishBtn {
      display:none; width:100%; padding:14px; background:linear-gradient(135deg,#27ae60,#229954);
      color:white; border:none; border-radius:30px; font-size:1.05em;
      font-weight:bold; cursor:pointer; margin-top:20px; transition:all 0.3s;
    }
    #finishBtn:hover { background:linear-gradient(135deg,#1e7e34,#155724); transform:translateY(-2px); }

    /* SELECTED (finish mode) */
    .option.selected { background:transparent; color:#333; }
    .option.selected .radio-circle { border-color:#4caf50; background:#4caf50; }

    /* EXPLANATION TOGGLE BUTTON */
    .exp-toggle-btn {
      display:none; padding:10px 16px; background:none;
      border:none; border-top:1px solid #eee;
      color:#7c4dff; font-size:0.9em; font-weight:600;
      cursor:pointer; width:100%; text-align:left;
    }
    .exp-toggle-btn:hover { background:#f5f0ff; }
    .exp-toggle-btn.visible { display:block; }

    /* RESULT */
    #result {
      text-align:center; font-size:1.1em; color:#1e3c72; line-height:2;
    }
    #result .result-btn {
      margin-top:12px; padding:12px 30px; background:linear-gradient(135deg,#ff9800,#e68900);
      color:white; border:none; border-radius:30px; font-size:1em;
      font-weight:bold; cursor:pointer; transition:all 0.3s; display:inline-block;
    }
    #result .result-btn:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(255,152,0,0.4); }
    #result .review-btn {
      margin-top:12px; margin-left:10px; padding:12px 30px;
      background:linear-gradient(135deg,#1e3c72,#2a5298);
      color:white; border:none; border-radius:30px; font-size:1em;
      font-weight:bold; cursor:pointer; transition:all 0.3s; display:inline-block;
    }
    #result .review-btn:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(30,60,114,0.4); }

    /* REVIEW SECTION */
    #reviewSection { display:none; margin-top:24px; }
    #reviewSection h3 { color:#1e3c72; margin-bottom:14px; font-size:1.1em; }

    /* BACK BUTTON */
    .exam-back-btn {
      display:inline-block; background:linear-gradient(135deg,#636e72,#4a4f52);
      color:white; border:none; padding:9px 20px; border-radius:30px;
      cursor:pointer; font-weight:700; font-size:0.92em; transition:all 0.25s;
      margin-bottom:16px;
    }
    .exam-back-btn:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.2); }

    /* Question type badge */
    .q-type-badge {
      display:inline-block; padding:3px 10px; border-radius:20px;
      font-size:0.75em; font-weight:700; margin-bottom:10px;
    }
    .q-type-badge.mc  { background:#e3f2fd; color:#1565c0; }
    .q-type-badge.tf  { background:#f3e5f5; color:#6a1b9a; }

    @media(max-width:600px){
      .container { padding:4px 0; }
      .card { padding:16px 10px; border-radius:12px; width:100%; max-width:none; }
      h1 { font-size:1.2em; padding-top:12px; margin-bottom:14px; }
      .mode-btns { flex-direction:column; align-items:center; }
      .mode-btn { width:100%; max-width:320px; padding:14px 24px; font-size:1em; }
      #modeSelection h2 { font-size:1.1em; }
      #modeSelection p { font-size:0.9em; margin-bottom:18px; }
      .q-num-row { padding:12px 4px 4px; }
      .q-num { font-size:1.1em; }
      .q-divider { margin:0; }
      .question-text { font-size:0.97em; padding:8px 4px 12px; }
      .option { padding:12px 0; font-size:0.93em; gap:2px; }
      .option .radio-circle { width:18px; height:18px; }
      .exp-toggle-btn { padding:9px 12px; font-size:0.87em; }
      .explanation-box { padding:12px; font-size:0.9em; }
      #finishBtn { padding:12px; font-size:1em; }
      #result { font-size:1em; line-height:1.8; }
      #result .result-btn, #result .review-btn { display:block; width:100%; margin:8px 0 0 0; padding:12px 20px; font-size:0.97em; }
      .exam-back-btn { padding:7px 16px; font-size:0.88em; margin-bottom:12px; }
    }
    @media(max-width:380px){
      .container { padding:2px 0; }
      .card { padding:12px 0; width:100%; max-width:none; }
      h1 { font-size:1.05em; }
      .option { padding:11px 0; font-size:0.9em; gap:2px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📚 Online Exam System</h1>

  <div class="card">
    <div style="text-align:left;">
      <button class="exam-back-btn" onclick="safeBack()">← Go Back</button>
    </div>
    <div id="courseTitle"></div>

    <!-- LOADING -->
    <div id="loadingDiv">
      <div class="loading-spinner"></div>
      <p>Loading questions...</p>
    </div>

    <!-- MODE SELECTION -->
    <div id="modeSelection">
      <h2>Choose Exam Mode</h2>
      <p>How would you like to receive feedback on your answers?</p>
      <div class="mode-btns">
        <button class="mode-btn instant" onclick="startExam('instant')">⚡ Instant Feedback</button>
        <button class="mode-btn finish"  onclick="startExam('finish')">✅ After Finishing</button>
      </div>
    </div>

    <!-- QUESTIONS -->
    <div id="questionsDiv"></div>

    <!-- PROGRESS -->
    <div id="progressWrap" style="display:none;">
      <p class="progress-label" id="progressLabel"></p>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    </div>

    <!-- FINISH -->
    <button id="finishBtn" onclick="finishExam()">📋 Finish &amp; See Results</button>

    <!-- RESULT -->
    <div id="result"></div>

    <!-- REVIEW -->
    <div id="reviewSection">
      <h3>📋 Review Your Answers</h3>
      <div id="reviewList"></div>
    </div>
  </div>
</div>

      ]
    },
    'History of Ethiopia': {

        {q:'Aksum was known for trade in:', options:['Rice and wheat','Ivory, gold, and spices','Cotton and silk','Oil and minerals'], answer:'Ivory, gold, and spices', type:'multiple_choice', explanation:'Aksum thrived through trade of ivory, gold, and spices along the Red Sea trade routes.'}
      ],
      medium: [
        {q:'Christianity became the state religion of Aksum under King Ezana.', options:['True','False'], answer:'True', type:'true_false', explanation:'King Ezana converted to Christianity in the 4th century CE, making it the official state religion of Aksum.'},
        {q:'The tall stone structures built by Aksumites are called:', options:['Pyramids','Obelisks or Stelae','Cathedrals','Ziggurats'], answer:'Obelisks or Stelae', type:'multiple_choice', explanation:'The Aksumite stelae (obelisks) are towering stone monuments, many still standing in Aksum today.'},
        {q:'Aksum traded mainly through the Red Sea.', options:['True','False'], answer:'True', type:'true_false', explanation:'The Red Sea was Aksum\'s main trade highway, connecting it to Arabia, India, and the Mediterranean.'}
      ],
      difficult: [
        {q:'The Aksumite coinage system was one of the first in sub-Saharan Africa.', options:['True','False'], answer:'True', type:'true_false', explanation:'Aksum developed one of the earliest coinage systems in Africa, issuing gold, silver, and bronze coins.'},
        {q:'The decline of Aksum was primarily linked to:', options:['Military conquest by Egypt','Shifts in trade routes and environmental degradation','A massive earthquake','Invasion by the Zagwe dynasty'], answer:'Shifts in trade routes and environmental degradation', type:'multiple_choice', explanation:'The rise of Islam shifting Red Sea trade routes, combined with deforestation and soil degradation, contributed to Aksum\'s decline.'},

      ]
    },
    'Moral and Civic Education': {
      low: [
        {q:'Ethics deals with right and wrong.', options:['True','False'], answer:'True', type:'true_false', explanation:'Ethics is the branch of philosophy concerned with moral principles that govern right and wrong conduct.'},
        {q:'Virtue ethics was developed by:', options:['Kant','Mill','Aristotle','Plato'], answer:'Aristotle', type:'multiple_choice', explanation:'Aristotle developed virtue ethics, focusing on character and virtues rather than rules or consequences.'},
        {q:'The Golden Rule says "Do unto others as you would have them do unto you."', options:['True','False'], answer:'True', type:'true_false', explanation:'The Golden Rule is a universal ethical principle found across many cultures and religions.'}
      ],
      medium: [
        {q:'Utilitarianism judges actions by their consequences for overall happiness.', options:['True','False'], answer:'True', type:'true_false', explanation:'Utilitarianism (Mill, Bentham) holds that the right action maximizes overall happiness or utility.'},
        {q:'The categorical imperative is from:', options:['Aristotle','Kant','Mill','Hume'], answer:'Kant', type:'multiple_choice', explanation:'Immanuel Kant\'s categorical imperative is the central principle of his deontological ethics.'},

      ],
      difficult: [
        {q:'The trolley problem illustrates tension between deontological and consequentialist ethics.', options:['True','False'], answer:'True', type:'true_false', explanation:'The trolley problem pits the deontological rule against killing vs. the consequentialist goal of minimizing harm.'},
        {q:"Rawls' veil of ignorance is designed to derive principles of justice without bias.", options:['True','False'], answer:'True', type:'true_false', explanation:"Rawls' veil of ignorance asks us to design society's rules without knowing our place in it, ensuring impartiality."},
        {q:'Care ethics (Gilligan) prioritizes:', options:['Universal rules','Consequences for society','Relationships and context','Individual rights only'], answer:'Relationships and context', type:'multiple_choice', explanation:'Carol Gilligan\'s care ethics emphasizes relationships, empathy, and context over abstract universal principles.'}
      ]
    }
  };

  function getFallback(c, l) {
    if (fallbackQuestions[c] && fallbackQuestions[c][l]) return fallbackQuestions[c][l];
    return [
      {q:'What is the capital of France?', options:['Berlin','Madrid','Paris','Lisbon'], answer:'Paris', type:'multiple_choice', explanation:'Paris is the capital and largest city of France.'},
      {q:'Mars is known as the Red Planet.', options:['True','False'], answer:'True', type:'true_false', explanation:'Mars appears red due to iron oxide (rust) on its surface.'},
      {q:'William Shakespeare wrote Romeo and Juliet.', options:['True','False'], answer:'True', type:'true_false', explanation:'Romeo and Juliet is one of Shakespeare\'s most famous tragic plays.'}
    ];
  }

  /* ── LOAD QUESTIONS FROM FIRESTORE FIRST ── */
  async function loadQuestions() {
    document.getElementById('loadingDiv').style.display = 'block';
    document.getElementById('modeSelection').style.display = 'none';
    try {
      const q = query(
        collection(db, 'adminExams'),
        where('course', '==', course),
        where('chapter', '==', chapter),
        where('difficulty', '==', level)
      );
      const snap = await getDocs(q);
      if (!snap.empty) {
        questions = snap.docs.map(function(doc) {
          var d = doc.data();
          var opts = d.type === 'true_false' ? ['True','False'] : (d.options || []);
          return { q: d.question, options: opts, answer: d.answer, type: d.type || 'multiple_choice', explanation: d.explanation || '', explanationMode: d.explanationMode || 'single', choiceExplanations: d.choiceExplanations || {}, imgs: d.imgs || {}, hint: d.hint || '' };
        });
      } else {
        questions = getFallback(course, level);
      }
    } catch(e) {
      questions = getFallback(course, level);
    }
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('modeSelection').style.display = 'block';
  }

  loadQuestions();

  /* ── UPDATE PROGRESS ── */
  function updateProgress() {
    var total    = questions.length;
    var answered = answers.filter(function(a){ return a !== null; }).length;
    document.getElementById('progressLabel').textContent = answered + ' of ' + total + ' answered';
    document.getElementById('progressBar').style.width = Math.round((answered / total) * 100) + '%';
  }

  /* ── BUILD ONE QUESTION ELEMENT ── */
  function buildQuestionEl(index, lockAndColor) {
    var q    = questions[index];
    var wrap = document.createElement('div');
    wrap.className = 'question';
    wrap.id = 'qwrap_' + index;

    /* Question number row */
    var numRow = document.createElement('div');
    numRow.className = 'q-num-row';
    var numEl = document.createElement('span');
    numEl.className = 'q-num';
    numEl.textContent = 'Q' + (index + 1);
    numRow.appendChild(numEl);
    var numActions = document.createElement('div');
    numActions.className = 'q-num-actions';
    numRow.appendChild(numActions);
    wrap.appendChild(numRow);

    /* Divider */
    var divider = document.createElement('div');
    divider.className = 'q-divider';
    wrap.appendChild(divider);

    var imgs = q.imgs || {};

    /* Question text */
    var qText = document.createElement('div');
    qText.className = 'question-text';
    qText.textContent = q.q;
    wrap.appendChild(qText);

    /* Question image */
    if (imgs.question) {
      var qImg = document.createElement('img');
      qImg.src = imgs.question; qImg.className = 'q-img'; qImg.alt = 'question image';
      wrap.appendChild(qImg);
    }

    /* Options */
    var optList = document.createElement('div');
    optList.className = 'options-list';
    var optKeys = ['optA','optB','optC','optD'];

    q.options.forEach(function(opt, oi) {
      var btn = document.createElement('button');
      btn.className = 'option';
      btn.setAttribute('data-value', opt);

      var circle = document.createElement('span');
      circle.className = 'radio-circle';
      btn.appendChild(circle);

      var txt = document.createTextNode(opt);
      btn.appendChild(txt);

      /* Option image */
      var optImgKey = optKeys[oi];
      if (imgs[optImgKey]) {
        var oImg = document.createElement('img');
        oImg.src = imgs[optImgKey]; oImg.className = 'opt-img'; oImg.alt = 'option image';
        btn.appendChild(oImg);
      }

      if (lockAndColor) {
        btn.disabled = true;
        var userAns = answers[index];
        if (opt === q.answer) btn.classList.add('correct');
        else if (opt === userAns && userAns !== q.answer) btn.classList.add('wrong');
      } else {
        if (answers[index] === opt) btn.classList.add('selected');
        btn.onclick = function() { selectAnswer(opt, index, wrap); };
      }
      optList.appendChild(btn);
    });
    wrap.appendChild(optList);

    /* Hint button — show if admin provided hint, or only for low-level questions in live mode */
    var hasAdminHint = q.hint && q.hint.trim().length > 0;
    if ((hasAdminHint || level === 'low') && !lockAndColor) {
      var hintBtn = document.createElement('button');
      hintBtn.className = 'hint-btn visible';
      hintBtn.id = 'hintBtn_' + index;
      hintBtn.innerHTML = '∆ Hint';
      var hintBox = document.createElement('div');
      hintBox.className = 'hint-box';
      hintBox.id = 'hintBox_' + index;
      var hintText = q.hint && q.hint.trim() ? q.hint : ('Hint: the correct answer starts with "' + (q.answer ? q.answer.charAt(0) : '?') + '"');
      hintBox.textContent = hintText;
      hintBtn.onclick = function(){
        hintBox.style.display = (hintBox.style.display === 'block') ? 'none' : 'block';
      };
      wrap.appendChild(hintBtn);
      wrap.appendChild(hintBox);
    }

    /* Explanation toggle */
    var perChoiceMode = (q.explanationMode === 'per_choice');
    var hasExplanation = perChoiceMode
      ? (q.choiceExplanations && Object.keys(q.choiceExplanations).some(function(k){ return q.choiceExplanations[k]; }))
      : (q.explanation || imgs.explanation);

    if (hasExplanation) {
      var expBtn = document.createElement('button');
      expBtn.className = 'exp-toggle-btn' + (lockAndColor || (mode === 'instant' && answers[index] !== null) ? ' visible' : '');
      expBtn.innerHTML = '∆ Explanation';
      expBtn.onclick = function() {
        var box = wrap.querySelector('.explanation-box');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
      };
      wrap.appendChild(expBtn);

      var expBox = document.createElement('div');
      var isCorrect = answers[index] === q.answer;
      expBox.className = 'explanation-box' + (!isCorrect && answers[index] !== null ? ' wrong-exp' : '');
      expBox.style.display = 'none';

      if (perChoiceMode) {
        var chosenAns = answers[index];
        var choiceText = chosenAns && q.choiceExplanations ? (q.choiceExplanations[chosenAns] || '') : '';
        expBox.innerHTML = choiceText || '<em style="color:#999">No explanation for this choice.</em>';
      } else {
        expBox.innerHTML = q.explanation || '';
        if (imgs.explanation) {
          var eImg = document.createElement('img');
          eImg.src = imgs.explanation; eImg.className = 'exp-img'; eImg.alt = 'explanation image';
          expBox.appendChild(eImg);
        }
      }
      wrap.appendChild(expBox);
    }

    return wrap;
  }

  /* ── SHOW ALL QUESTIONS AT ONCE ── */
  function showAllQuestions() {
    var qDiv = document.getElementById('questionsDiv');
    qDiv.innerHTML = '';
    questions.forEach(function(_, i) {
      qDiv.appendChild(buildQuestionEl(i, false));
    });
  }

  /* ── START EXAM ── */
  window.startExam = function(selectedMode) {
    mode    = selectedMode;
    answers = new Array(questions.length).fill(null);
    document.getElementById('modeSelection').style.display = 'none';
    document.getElementById('progressWrap').style.display  = 'block';
    document.getElementById('finishBtn').style.display     = 'block';
    updateProgress();
    showAllQuestions();
  };

  /* ── SELECT ANSWER ── */
  function selectAnswer(selected, index, wrap) {
    answers[index] = selected;
    updateProgress();

    var q       = questions[index];
    var correct = q.answer;
    var btns    = wrap.querySelectorAll('.option');

    if (mode === 'instant') {
      /* color immediately and lock */
      btns.forEach(function(b) {
        b.disabled = true;
        b.classList.remove('selected');
        var bVal = b.getAttribute('data-value') || b.textContent.trim();
        if (bVal === correct) b.classList.add('correct');
        else if (bVal === selected && selected !== correct) b.classList.add('wrong');
      });
      /* update explanation box content/color */
      var expBox = wrap.querySelector('.explanation-box');
      if (expBox) {
        var isCorrect = selected === correct;
        expBox.className = 'explanation-box' + (isCorrect ? '' : ' wrong-exp');
        /* for per-choice mode, fill in the chosen answer's text */
        if (q.explanationMode === 'per_choice') {
          var choiceText = q.choiceExplanations ? (q.choiceExplanations[selected] || '') : '';
          expBox.innerHTML = choiceText || '<em style="color:#999">No explanation for this choice.</em>';
        }
      }
    } else {
      /* finish mode — just highlight selection */
      btns.forEach(function(b) {
        b.classList.remove('selected');
        var bVal = b.getAttribute('data-value') || b.textContent.trim();
        if (bVal === selected) b.classList.add('selected');
      });
    }

    /* Hide hint button and box after answer is selected */
    var hintBtnEl = wrap.querySelector('.hint-btn');
    if (hintBtnEl) hintBtnEl.style.display = 'none';
    var hintBoxEl = wrap.querySelector('.hint-box');
    if (hintBoxEl) hintBoxEl.style.display = 'none';

    /* reveal explanation toggle button (instant mode only — finish mode shows after Review) */
    if (mode === 'instant') {
      var expBtn = wrap.querySelector('.exp-toggle-btn');
      if (expBtn) expBtn.classList.add('visible');
    }
  }

  /* ── FINISH EXAM ── */
  window.finishExam = function() {
    examScreen = 'results';
    document.getElementById('finishBtn').style.display  = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('questionsDiv').innerHTML   = '';

    var correct    = 0;
    answers.forEach(function(a, i) { if (a === questions[i].answer) correct++; });
    var total      = questions.length;
    var percentage = Math.round((correct / total) * 100);
    var emoji      = percentage >= 80 ? '🌟' : percentage >= 50 ? '👍' : '📖';

    var reviewBtnHtml = (mode === 'finish')
      ? '<button class="review-btn" onclick="showReview()">📋 Review Answers</button>'
      : '';

    document.getElementById('result').innerHTML =
      '<p style="font-size:2.5em;margin-bottom:8px;">' + emoji + '</p>' +
      '<p><strong>You got ' + correct + ' / ' + total + ' correct</strong></p>' +
      '<p style="font-size:1.3em;color:#ff9800;font-weight:bold;margin-bottom:16px;">' + percentage + '%</p>' +
      '<button class="result-btn" onclick="location.reload()">🔁 Try Again</button>' +
      reviewBtnHtml;
  };

  /* ── SHOW REVIEW ── */
  window.showReview = function() {
    var reviewSection = document.getElementById('reviewSection');
    var reviewList    = document.getElementById('reviewList');
    reviewList.innerHTML = '';

    questions.forEach(function(q, i) {
      reviewList.appendChild(buildQuestionEl(i, true));
    });

    reviewSection.style.display = 'block';
    reviewSection.scrollIntoView({ behavior: 'smooth' });
  };
</script>
</body>
