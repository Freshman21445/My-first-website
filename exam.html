<!DOCTYPE html>
<html>
<head>
  <title>Exam</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; width:100%; overflow-x:hidden; }
    body {
      font-family:'Segoe UI',Arial,sans-serif;
      background-image:url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format');
      background-size:cover; background-position:center;
      background-repeat:no-repeat; background-attachment:fixed;
      min-height:100vh; overflow-y:auto; position:relative;
    }
    body::before {
      content:""; position:fixed; top:0; left:0;
      width:100%; height:100%; background:rgba(0,0,0,0.60); z-index:0;
    }
    .container {
      position:relative; z-index:1; max-width:800px;
      margin:0 auto; padding:20px; min-height:100vh;
    }
    h1 {
      text-align:center; color:white; margin-bottom:20px;
      font-size:1.6em; text-shadow:2px 2px 6px rgba(0,0,0,0.6); padding-top:20px;
    }
    .card {
      background:rgba(255,255,255,0.97); border-radius:20px;
      padding:32px; box-shadow:0 10px 30px rgba(0,0,0,0.25); margin-bottom:24px;
    }
    #courseTitle {
      color:#1e3c72; font-size:1.15em; font-weight:bold;
      margin-bottom:20px; text-align:center;
    }

    /* TIMER */
    #timerWrap {
      display:none; text-align:center; margin-bottom:18px;
      background:linear-gradient(135deg,#1e3c72,#2a5298);
      border-radius:16px; padding:14px 20px;
    }
    #timerWrap p { color:rgba(255,255,255,0.7); font-size:0.82em; margin-bottom:4px; letter-spacing:0.5px; text-transform:uppercase; }
    #timerDisplay {
      font-size:2.4em; font-weight:800; color:#ffd700;
      letter-spacing:2px; font-family:monospace; text-shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    #timerWrap.urgent { background:linear-gradient(135deg,#c0392b,#e74c3c); animation:pulse 1s infinite; }
    #timerWrap.urgent #timerDisplay { color:white; }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.82; }
    }

    /* MODE SELECTION */
    #modeSelection { text-align:center; }
    #modeSelection h2 { color:#1e3c72; margin-bottom:10px; font-size:1.3em; }
    #modeSelection p  { color:#666; margin-bottom:24px; font-size:0.97em; }
    .mode-btns { display:flex; gap:18px; justify-content:center; flex-wrap:wrap; }
    .mode-btn {
      padding:16px 36px; border:none; border-radius:30px;
      font-size:1.05em; font-weight:bold; cursor:pointer; transition:all 0.3s;
    }
    .mode-btn.instant { background:linear-gradient(135deg,#ff9800,#e68900); color:white; }
    .mode-btn.instant:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(255,152,0,0.45); }
    .mode-btn.finish  { background:linear-gradient(135deg,#27ae60,#229954); color:white; }
    .mode-btn.finish:hover  { transform:translateY(-3px); box-shadow:0 8px 20px rgba(39,174,96,0.45); }
    .timer-note {
      margin-top:14px; background:#e8f5e9; border-radius:12px;
      padding:10px 16px; border-left:4px solid #27ae60;
      color:#1b5e20; font-size:0.87em; font-weight:600;
    }

    /* QUESTIONS — scrollable + draggable */
    #questionsDiv {
      max-height:65vh; overflow-y:auto; padding-right:6px;
      scrollbar-width:thin; scrollbar-color:#ff9800 #f0f0f0;
      cursor:grab; user-select:none;
    }
    #questionsDiv.dragging { cursor:grabbing; }
    #questionsDiv::-webkit-scrollbar { width:6px; }
    #questionsDiv::-webkit-scrollbar-track { background:#f0f0f0; border-radius:10px; }
    #questionsDiv::-webkit-scrollbar-thumb { background:#ff9800; border-radius:10px; }
    .question { margin-bottom:22px; }
    .question-text {
      font-size:1.08em; color:#1e3c72; margin-bottom:14px; line-height:1.6;
    }
    .options-list { display:flex; flex-direction:column; gap:10px; }
    .option {
      padding:12px 20px; border:2px solid #ddd; border-radius:30px;
      background:#f9f9f9; font-size:0.97em; cursor:pointer;
      text-align:left; transition:all 0.2s; font-weight:500; color:#333;
    }
    .option:hover { background:#fff3e0; border-color:#ff9800; color:#e65100; }
    .option.correct { background:#e8f5e9; border-color:#27ae60; color:#1b5e20; }
    .option.wrong   { background:#fce4ec; border-color:#e91e63; color:#880e4f; }
    .option:disabled { cursor:not-allowed; }

    /* COURSE PHOTO */
    #coursePhotoDiv {
      display:none; margin-top:24px; border-radius:18px; overflow:hidden;
      box-shadow:0 8px 24px rgba(0,0,0,0.18); position:relative;
    }
    #coursePhoto {
      width:100%; height:200px; object-fit:cover; display:block;
    }
    .photo-caption {
      position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(transparent, rgba(0,0,0,0.72));
      color:white; padding:14px 18px 12px;
      font-size:0.85em; font-weight:700; text-align:center;
      letter-spacing:0.5px;
    }

    /* PROGRESS */
    .progress-bar-wrap {
      background:#eee; border-radius:30px; height:8px; margin-bottom:20px; overflow:hidden;
    }
    .progress-bar { height:8px; border-radius:30px; background:linear-gradient(90deg,#ff9800,#f39c12); transition:width 0.4s; }
    .progress-label { color:#888; font-size:0.88em; margin-bottom:8px; text-align:right; }

    /* FINISH BTN */
    #finishBtn {
      display:none; width:100%; padding:14px; background:linear-gradient(135deg,#27ae60,#229954);
      color:white; border:none; border-radius:30px; font-size:1.05em;
      font-weight:bold; cursor:pointer; margin-top:20px; transition:all 0.3s;
    }
    #finishBtn:hover { background:linear-gradient(135deg,#1e7e34,#155724); transform:translateY(-2px); }

    /* RESULT */
    #result {
      text-align:center; font-size:1.1em; color:#1e3c72; line-height:2;
    }
    #result button {
      margin-top:16px; padding:12px 30px; background:linear-gradient(135deg,#ff9800,#e68900);
      color:white; border:none; border-radius:30px; font-size:1em;
      font-weight:bold; cursor:pointer; transition:all 0.3s;
    }
    #result button:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(255,152,0,0.4); }
    .result-time-badge {
      display:inline-block; background:linear-gradient(135deg,#1e3c72,#2a5298);
      color:white; padding:6px 18px; border-radius:30px; font-size:0.82em;
      font-weight:700; margin-top:6px; letter-spacing:0.5px;
    }

    /* BACK LINK */
    .back-link {
      display:inline-block; margin-bottom:18px; color:rgba(255,255,255,0.85);
      text-decoration:none; font-weight:bold; font-size:0.97em;
      background:rgba(255,255,255,0.15); padding:8px 20px; border-radius:30px;
      backdrop-filter:blur(4px); transition:all 0.2s;
    }
    .back-link:hover { background:rgba(255,255,255,0.25); color:white; }

    @media(max-width:600px){
      .card { padding:20px; }
      h1 { font-size:1.25em; }
      .mode-btns { flex-direction:column; align-items:center; }
      .mode-btn { width:100%; max-width:280px; }
      #questionsDiv { max-height:55vh; }
    }
  </style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">← Back to Dashboard</a>
  <h1>📚 Online Exam System</h1>

  <div class="card">
    <div id="courseTitle"></div>

    <!-- TIMER (shown in finish mode) -->
    <div id="timerWrap">
      <p>⏱ Time Remaining</p>
      <div id="timerDisplay">10:00</div>
    </div>

    <!-- MODE SELECTION -->
    <div id="modeSelection">
      <h2>Choose Exam Mode</h2>
      <p>How would you like to receive feedback on your answers?</p>
      <div class="mode-btns">
        <button class="mode-btn instant" onclick="startExam('instant')">⚡ Instant Feedback</button>
        <button class="mode-btn finish"  onclick="startExam('finish')">✅ Submit at End</button>
      </div>
      <div class="timer-note">⏱ "Submit at End" mode includes a <strong>10-minute countdown timer</strong>. Auto-submits when time runs out.</div>
    </div>

    <!-- QUESTIONS -->
    <div id="questionsDiv"></div>

    <!-- COURSE PHOTO -->
    <div id="coursePhotoDiv">
      <img id="coursePhoto" src="" alt="Course illustration">
      <div class="photo-caption" id="coursePhotoCaption"></div>
    </div>

    <!-- PROGRESS -->
    <div id="progressWrap" style="display:none;">
      <p class="progress-label" id="progressLabel"></p>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    </div>

    <!-- FINISH -->
    <button id="finishBtn" onclick="finishExam()">📋 Finish &amp; See Results</button>

    <!-- RESULT -->
    <div id="result"></div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const course  = urlParams.get('course')  || 'Unknown Course';
  const level   = urlParams.get('level')   || 'low';
  const chapter = urlParams.get('chapter') || '1';

  document.getElementById('courseTitle').textContent =
    course + ' — Chapter ' + chapter + ' (' + level.charAt(0).toUpperCase() + level.slice(1) + ' Level)';

  let mode      = '';
  let questions = [];
  let answers   = [];
  let currentQ  = 0;
  let timerInterval = null;
  let timeLeft  = 600;
  let examStartTime = null;

  /* ── DRAG-TO-SCROLL ── */
  var qDiv = document.getElementById('questionsDiv');
  var isDragging = false, startY = 0, startScroll = 0;
  qDiv.addEventListener('mousedown', function(e){
    isDragging = true; startY = e.clientY; startScroll = qDiv.scrollTop;
    qDiv.classList.add('dragging');
  });
  document.addEventListener('mousemove', function(e){
    if(!isDragging) return;
    qDiv.scrollTop = startScroll - (e.clientY - startY);
  });
  document.addEventListener('mouseup', function(){
    isDragging = false; qDiv.classList.remove('dragging');
  });
  qDiv.addEventListener('touchstart', function(e){
    startY = e.touches[0].clientY; startScroll = qDiv.scrollTop;
  },{ passive:true });
  qDiv.addEventListener('touchmove', function(e){
    qDiv.scrollTop = startScroll - (e.touches[0].clientY - startY);
  },{ passive:true });

  /* ── COURSE PHOTOS ── */
  var coursePhotos = {
    'Computer Programming':   { url:'https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=700&auto=format', caption:'Computer Programming — Logic, algorithms & software engineering' },
    'Anthropology':           { url:'https://images.unsplash.com/photo-1508866300691-f0d19e68cae0?w=700&auto=format', caption:'Anthropology — Studying the diversity and history of human cultures' },
    'Emerging Technology':    { url:'https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=700&auto=format', caption:'Emerging Technology — AI, robotics & the technology of tomorrow' },
    'Entrepreneurship':       { url:'https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=700&auto=format', caption:'Entrepreneurship — Building ventures that change the world' },
    'Applied Mathematics':    { url:'https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=700&auto=format', caption:'Applied Mathematics — The language of science, engineering & AI' },
    'English':                { url:'https://images.unsplash.com/photo-1455390582262-044cdead277a?w=700&auto=format', caption:'English — Communication, grammar & the power of language' },
    'History of Ethiopia':    { url:'https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?w=700&auto=format', caption:'History of Ethiopia — Ancient kingdoms, culture & rich heritage' },
    'Moral and Civic Education':{ url:'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=700&auto=format', caption:'Moral & Civic Education — Ethics, values & responsible citizenship' },
    'Economics':              { url:'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=700&auto=format', caption:'Economics — Understanding markets, money & global trade' },
    'Geography':              { url:'https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?w=700&auto=format', caption:'Geography — Exploring the physical and human world around us' },
    'Mathematics':            { url:'https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=700&auto=format', caption:'Mathematics — Numbers, patterns & problem solving' },
    'Psychology':             { url:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=700&auto=format', caption:'Psychology — Understanding the human mind and behavior' },
    'Logic and Critical Thinking':{ url:'https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=700&auto=format', caption:'Logic & Critical Thinking — Reasoning clearly in a complex world' }
  };

  function showCoursePhoto(){
    var info = coursePhotos[course];
    if(!info) return;
    var pd = document.getElementById('coursePhotoDiv');
    var pi = document.getElementById('coursePhoto');
    var pc = document.getElementById('coursePhotoCaption');
    pi.src = info.url;
    pc.textContent = info.caption;
    pd.style.display = 'block';
  }

  /* ── TIMER ── */
  function startTimer(){
    timeLeft = 600;
    var wrap = document.getElementById('timerWrap');
    wrap.style.display = 'block';
    updateTimerDisplay();
    timerInterval = setInterval(function(){
      timeLeft--;
      updateTimerDisplay();
      if(timeLeft <= 60) wrap.classList.add('urgent');
      if(timeLeft <= 0){
        clearInterval(timerInterval);
        finishExam(true);
      }
    }, 1000);
  }

  function updateTimerDisplay(){
    var m = Math.floor(timeLeft / 60);
    var s = timeLeft % 60;
    document.getElementById('timerDisplay').textContent =
      (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  function stopTimer(){
    if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
    document.getElementById('timerWrap').style.display = 'none';
  }

  function getElapsedTime(){
    if(!examStartTime) return '—';
    var elapsed = Math.floor((Date.now() - examStartTime) / 1000);
    var m = Math.floor(elapsed / 60);
    var s = elapsed % 60;
    return (m > 0 ? m + 'm ' : '') + s + 's';
  }

  /* ── ALL QUESTIONS ── */
  var allQuestions = {

      ]
    },

      low: [
        {q:'Anthropology is the study of:', options:['Rocks','Humans','Plants','Stars'], answer:'Humans'},
        {q:'Which is a subfield of anthropology?', options:['Archaeology','Chemistry','Physics','Biology'], answer:'Archaeology'},
        {q:'Margaret Mead was a famous:', options:['Physicist','Anthropologist','Economist','Chemist'], answer:'Anthropologist'}
      ],
      medium: [
        {q:'Ethnography is:', options:['Writing about cultures','Lab experiment','Survey','Genetic analysis'], answer:'Writing about cultures'},
        {q:'Cultural relativism means:', options:['All cultures equal morally','Judging a culture by its own standards','Superiority of Western culture','None'], answer:'Judging a culture by its own standards'},

      low: [
        {q:'AI stands for:', options:['Artificial Intelligence','Automated Interface','Algorithmic Input','Advanced Integration'], answer:'Artificial Intelligence'},
        {q:'Which is an IoT device?', options:['Smart Thermostat','Desktop PC','Printer','Monitor'], answer:'Smart Thermostat'},
        {q:'A chatbot is an example of:', options:['Quantum computing','AI application','Blockchain','IoT'], answer:'AI application'}
      ],
      medium: [
        {q:'Machine Learning is a subset of:', options:['AI','Networking','Databases','Hardware'], answer:'AI'},
        {q:'Supervised learning requires:', options:['Unlabeled data','Labeled training data','No data','Only test data'], answer:'Labeled training data'},

      medium: [

    },
    'Applied Mathematics': {
      low: [
        {q:'A vector has:', options:['Magnitude only','Direction only','Both magnitude and direction','Neither'], answer:'Both magnitude and direction'},

      ],
      medium: [

      ],
      difficult: [

    },
    'Moral and Civic Education': {

  function getQuestionsFor(c, l) {
    if (allQuestions[c] && allQuestions[c][l]) return allQuestions[c][l];
    return [
      {q:'What is the capital of France?', options:['Berlin','Madrid','Paris','Lisbon'], answer:'Paris'},
      {q:'Which planet is known as the Red Planet?', options:['Mars','Jupiter','Venus','Saturn'], answer:'Mars'},
      {q:'Who wrote Romeo and Juliet?', options:['Charles Dickens','Jane Austen','William Shakespeare','Mark Twain'], answer:'William Shakespeare'}
    ];
  }

  function updateProgress() {
    var total = questions.length;
    var done  = Math.min(currentQ, total);
    document.getElementById('progressLabel').textContent = 'Question ' + done + ' of ' + total;
    document.getElementById('progressBar').style.width = Math.round((done / total) * 100) + '%';
  }

  function startExam(selectedMode) {
    mode = selectedMode;
    examStartTime = Date.now();
    document.getElementById('modeSelection').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'block';
    questions = getQuestionsFor(course, level);
    answers   = new Array(questions.length).fill(null);
    currentQ  = 0;
    if (mode === 'finish') startTimer();
    showCoursePhoto();
    showQuestion(0);
  }

  function showQuestion(index) {
    updateProgress();
    var qDivEl = document.getElementById('questionsDiv');
    qDivEl.innerHTML = '';
    document.getElementById('finishBtn').style.display = 'none';
    document.getElementById('result').innerHTML = '';

    if (index >= questions.length) {
      if (mode === 'finish') {
        document.getElementById('finishBtn').style.display = 'block';
      } else {
        finishExam();
      }
      return;
    }

    var q    = questions[index];
    var wrap = document.createElement('div');
    wrap.className = 'question';

    var qText = document.createElement('div');
    qText.className = 'question-text';
    qText.innerHTML = '<strong>Q' + (index + 1) + ':</strong> ' + q.q;
    wrap.appendChild(qText);

    var optList = document.createElement('div');
    optList.className = 'options-list';

    q.options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.textContent = opt;
      btn.className   = 'option';
      btn.onclick = function() { selectAnswer(opt, index, wrap); };
      optList.appendChild(btn);
    });

    wrap.appendChild(optList);
    qDivEl.appendChild(wrap);
    qDivEl.scrollTop = 0;
  }

  function selectAnswer(selected, index, wrap) {
    answers[index] = selected;
    var btns = wrap.querySelectorAll('.option');
    btns.forEach(function(b) {
      b.disabled = true;
      if (b.textContent === questions[index].answer) b.classList.add('correct');
      else if (b.textContent === selected && selected !== questions[index].answer) b.classList.add('wrong');
    });

    if (mode === 'instant') {
      setTimeout(function() { currentQ++; showQuestion(currentQ); }, 900);
    } else {
      setTimeout(function() { currentQ++; showQuestion(currentQ); }, 600);
    }
  }

  function finishExam(timedOut) {
    stopTimer();
    document.getElementById('questionsDiv').innerHTML = '';
    document.getElementById('finishBtn').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('coursePhotoDiv').style.display = 'none';

    var correct = 0;
    answers.forEach(function(a, i) {
      if (a !== null && a === questions[i].answer) correct++;
    });
    var total      = questions.length;
    var answered   = answers.filter(function(a){ return a !== null; }).length;
    var percentage = total > 0 ? Math.round((correct / total) * 100) : 0;
    var emoji      = percentage >= 80 ? '🌟' : percentage >= 50 ? '👍' : '📖';
    var elapsed    = getElapsedTime();
    var timeoutMsg = timedOut ? '<br><span style="color:#e74c3c;font-size:0.85em;font-weight:700;">⏱ Time ran out — auto submitted</span>' : '';

    document.getElementById('result').innerHTML =
      '<p style="font-size:2.5em;margin-bottom:10px;">' + emoji + '</p>' +
      '<p><strong>You got ' + correct + ' / ' + total + ' correct</strong></p>' +
      '<p style="font-size:1.3em;color:#ff9800;font-weight:bold;">' + percentage + '%</p>' +
      '<p style="font-size:0.9em;color:#666;margin-top:4px;">Answered: ' + answered + ' / ' + total + timeoutMsg + '</p>' +
      '<div class="result-time-badge">⏱ Time taken: ' + elapsed + '</div><br>' +
      '<button onclick="location.reload()">🔁 Try Again</button>' +
      '<br><a href="index.html" style="display:inline-block;margin-top:12px;color:#1e3c72;font-weight:bold;">← Back to Dashboard</a>';
  }
</script>
