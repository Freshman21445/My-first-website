<!DOCTYPE html>
<html>
<head>
  <title>Exam</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; width:100%; overflow-x:hidden; }
    body {
      font-family:'Segoe UI',Arial,sans-serif;
      background-image:url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format');
      background-size:cover; background-position:center;
      background-repeat:no-repeat; background-attachment:fixed;
      min-height:100vh; overflow-y:auto; position:relative;
    }
    body::before {
      content:""; position:fixed; top:0; left:0;
      width:100%; height:100%; background:rgba(0,0,0,0.60); z-index:0;
    }
    .container {
      position:relative; z-index:1; max-width:800px;
      margin:0 auto; padding:20px; min-height:100vh;
    }
    h1 {
      text-align:center; color:white; margin-bottom:20px;
      font-size:1.6em; text-shadow:2px 2px 6px rgba(0,0,0,0.6); padding-top:20px;
    }
    .card {
      background:rgba(255,255,255,0.97); border-radius:20px;
      padding:32px; box-shadow:0 10px 30px rgba(0,0,0,0.25); margin-bottom:24px;
    }
    #courseTitle {
      color:#1e3c72; font-size:1.15em; font-weight:bold;
      margin-bottom:20px; text-align:center;
    }

    /* MODE SELECTION */
    #modeSelection { text-align:center; }
    #modeSelection h2 { color:#1e3c72; margin-bottom:10px; font-size:1.3em; }
    #modeSelection p  { color:#666; margin-bottom:24px; font-size:0.97em; }
    .mode-btns { display:flex; gap:18px; justify-content:center; flex-wrap:wrap; }
    .mode-btn {
      padding:16px 36px; border:none; border-radius:30px;
      font-size:1.05em; font-weight:bold; cursor:pointer; transition:all 0.3s;
    }
    .mode-btn.instant { background:linear-gradient(135deg,#ff9800,#e68900); color:white; }
    .mode-btn.instant:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(255,152,0,0.45); }
    .mode-btn.finish  { background:linear-gradient(135deg,#27ae60,#229954); color:white; }
    .mode-btn.finish:hover  { transform:translateY(-3px); box-shadow:0 8px 20px rgba(39,174,96,0.45); }

    /* QUESTIONS */
    .question { margin-bottom:10px; }
    .question-text {
      font-size:1.08em; color:#1e3c72; margin-bottom:14px; line-height:1.6;
    }
    .options-list { display:flex; flex-direction:column; gap:10px; }
    .option {
      padding:12px 20px; border:2px solid #ddd; border-radius:30px;
      background:#f9f9f9; font-size:0.97em; cursor:pointer;
      text-align:left; transition:all 0.2s; font-weight:500; color:#333;
    }
    .option:hover { background:#fff3e0; border-color:#ff9800; color:#e65100; }
    .option.correct { background:#e8f5e9; border-color:#27ae60; color:#1b5e20; }
    .option.wrong   { background:#fce4ec; border-color:#e91e63; color:#880e4f; }
    .option:disabled { cursor:not-allowed; }

    /* PROGRESS */
    .progress-bar-wrap {
      background:#eee; border-radius:30px; height:8px; margin-bottom:20px; overflow:hidden;
    }
    .progress-bar { height:8px; border-radius:30px; background:linear-gradient(90deg,#ff9800,#f39c12); transition:width 0.4s; }
    .progress-label { color:#888; font-size:0.88em; margin-bottom:8px; text-align:right; }

    /* FINISH BTN */
    #finishBtn {
      display:none; width:100%; padding:14px; background:linear-gradient(135deg,#27ae60,#229954);
      color:white; border:none; border-radius:30px; font-size:1.05em;
      font-weight:bold; cursor:pointer; margin-top:20px; transition:all 0.3s;
    }
    #finishBtn:hover { background:linear-gradient(135deg,#1e7e34,#155724); transform:translateY(-2px); }

    /* RESULT */
    #result {
      text-align:center; font-size:1.1em; color:#1e3c72; line-height:2;
    }
    #result button {
      margin-top:16px; padding:12px 30px; background:linear-gradient(135deg,#ff9800,#e68900);
      color:white; border:none; border-radius:30px; font-size:1em;
      font-weight:bold; cursor:pointer; transition:all 0.3s;
    }
    #result button:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(255,152,0,0.4); }

    /* BACK LINK */
    .back-link {
      display:inline-block; margin-bottom:18px; color:rgba(255,255,255,0.85);
      text-decoration:none; font-weight:bold; font-size:0.97em;
      background:rgba(255,255,255,0.15); padding:8px 20px; border-radius:30px;
      backdrop-filter:blur(4px); transition:all 0.2s;
    }
    .back-link:hover { background:rgba(255,255,255,0.25); color:white; }

    @media(max-width:600px){
      .card { padding:20px; }
      h1 { font-size:1.25em; }
      .mode-btns { flex-direction:column; align-items:center; }
      .mode-btn { width:100%; max-width:280px; }
    }
  </style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">← Back to Dashboard</a>
  <h1>📚 Online Exam System</h1>

  <div class="card">
    <div id="courseTitle"></div>

    <!-- MODE SELECTION -->
    <div id="modeSelection">
      <h2>Choose Exam Mode</h2>
      <p>How would you like to receive feedback on your answers?</p>
      <div class="mode-btns">
        <button class="mode-btn instant" onclick="startExam('instant')">⚡ Instant Feedback</button>
        <button class="mode-btn finish"  onclick="startExam('finish')">✅ Submit at End</button>
      </div>
    </div>

    <!-- QUESTIONS -->
    <div id="questionsDiv"></div>

    <!-- PROGRESS -->
    <div id="progressWrap" style="display:none;">
      <p class="progress-label" id="progressLabel"></p>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    </div>

    <!-- FINISH -->
    <button id="finishBtn" onclick="finishExam()">📋 Finish & See Results</button>

    <!-- RESULT -->
    <div id="result"></div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const course  = urlParams.get('course')  || 'Unknown Course';
  const level   = urlParams.get('level')   || 'low';
  const chapter = urlParams.get('chapter') || '1';

  document.getElementById('courseTitle').textContent =
    course + ' — Chapter ' + chapter + ' (' + level.charAt(0).toUpperCase() + level.slice(1) + ' Level)';

  let mode      = '';
  let questions = [];
  let answers   = [];
  let currentQ  = 0;

  const allQuestions = {
    'Computer Programming': {
      low: [
        {q:'What is 2+2?', options:['3','4','5','6'], answer:'4'},
        {q:'Which is a programming language?', options:['HTML','CSS','Python','Markdown'], answer:'Python'},
        {q:'What does print() do?', options:['Output to screen','Read input','Loop','Delete'], answer:'Output to screen'}
      ],
      medium: [
        {q:'What does JS stand for?', options:['JavaScript','JavaSystem','JustScript','JavaServer'], answer:'JavaScript'},
        {q:'Which symbol is used for single-line comments in JS?', options:['//','/*','#','--'], answer:'//'},
        {q:'What does int("5") return?', options:['"5"','5 as integer','5.0','Error'], answer:'5 as integer'}
      ],
      difficult: [
        {q:'What is recursion?', options:['A function calling itself','A loop','A type','A class'], answer:'A function calling itself'},
        {q:'type(3/2) in Python 3 returns:', options:['int','float','str','complex'], answer:'float'},
        {q:'[x**2 for x in range(4)] produces:', options:['[1,4,9,16]','[0,1,4,9]','[0,1,2,3]','[1,2,3,4]'], answer:'[0,1,4,9]'}
      ]
    },
    'Anthropology': {
      low: [
        {q:'Anthropology is the study of:', options:['Rocks','Humans','Plants','Stars'], answer:'Humans'},
        {q:'Which is a subfield of anthropology?', options:['Archaeology','Chemistry','Physics','Biology'], answer:'Archaeology'},
        {q:'Margaret Mead was a famous:', options:['Physicist','Anthropologist','Economist','Chemist'], answer:'Anthropologist'}
      ],
      medium: [
        {q:'Ethnography is:', options:['Writing about cultures','Lab experiment','Survey','Genetic analysis'], answer:'Writing about cultures'},
        {q:'Cultural relativism means:', options:['All cultures equal morally','Judging a culture by its own standards','Superiority of Western culture','None'], answer:'Judging a culture by its own standards'},
        {q:'Participant observation is used in:', options:['Archaeology','Ethnography','Genetics','Statistics'], answer:'Ethnography'}
      ],
      difficult: [
        {q:'Who proposed cultural relativism?', options:['Franz Boas','Charles Darwin','Karl Marx','Sigmund Freud'], answer:'Franz Boas'},
        {q:'Thick description was introduced by:', options:['Franz Boas','Malinowski','Clifford Geertz','Ruth Benedict'], answer:'Clifford Geertz'},
        {q:'Emic vs. etic: emic is:', options:['Outsider view','Insider view','Both outsider','Both insider'], answer:'Insider view'}
      ]
    },
    'Emerging Technology': {
      low: [
        {q:'AI stands for:', options:['Artificial Intelligence','Automated Interface','Algorithmic Input','Advanced Integration'], answer:'Artificial Intelligence'},
        {q:'Which is an IoT device?', options:['Smart Thermostat','Desktop PC','Printer','Monitor'], answer:'Smart Thermostat'},
        {q:'A chatbot is an example of:', options:['Quantum computing','AI application','Blockchain','IoT'], answer:'AI application'}
      ],
      medium: [
        {q:'Machine Learning is a subset of:', options:['AI','Networking','Databases','Hardware'], answer:'AI'},
        {q:'Supervised learning requires:', options:['Unlabeled data','Labeled training data','No data','Only test data'], answer:'Labeled training data'},
        {q:'Overfitting means:', options:['Model works on new data','Memorizes training but fails on new data','Model is too simple','Training is slow'], answer:'Memorizes training but fails on new data'}
      ],
      difficult: [
        {q:'Which algorithm is used for image recognition?', options:['CNN','LSTM','SVM','KNN'], answer:'CNN'},
        {q:'The Turing Test measures:', options:['Computing speed','Whether a machine can exhibit intelligent behavior','Memory capacity','Energy efficiency'], answer:'Whether a machine can exhibit intelligent behavior'},
        {q:'Backpropagation adjusts:', options:['Input data','Network architecture','Weights using gradient descent','Activation functions only'], answer:'Weights using gradient descent'}
      ]
    },
    'Entrepreneurship': {
      low: [
        {q:'What does MVP stand for?', options:['Minimum Viable Product','Most Valuable Player','Maximum Value Plan','Market Validation Process'], answer:'Minimum Viable Product'},
        {q:'A business plan is used to:', options:['Guide the business','Decorate the office','Hire employees','None'], answer:'Guide the business'},
        {q:'The Lean Startup was introduced by:', options:['Steve Jobs','Eric Ries','Bill Gates','Elon Musk'], answer:'Eric Ries'}
      ],
      medium: [
        {q:'A pivot means:', options:['Shutting down','Changing strategy based on validated learning','Hiring more','Expanding markets'], answer:'Changing strategy based on validated learning'},
        {q:'TAM stands for:', options:['Total Addressable Market','Target Audience Management','Tech Acceleration Model','Total Asset Management'], answer:'Total Addressable Market'},
        {q:'Problem-solution fit means:', options:['Your team likes idea','Customers confirm problem and solution addresses it','You have funding','Product is fully built'], answer:'Customers confirm problem and solution addresses it'}
      ],
      difficult: [
        {q:'A beachhead market strategy means:', options:['Targeting all customers','Starting with a narrow winnable segment','Focusing on premium only','Entering the largest market'], answer:'Starting with a narrow winnable segment'},
        {q:'Jobs-to-be-Done was popularized by:', options:['Peter Drucker','Clayton Christensen','Michael Porter','Jim Collins'], answer:'Clayton Christensen'},
        {q:'Customer Development steps:', options:['Discovery, Validation, Creation, Building','Build, Test, Sell, Scale','Plan, Fund, Launch, Grow','Ideate, Prototype, Test, Pivot'], answer:'Discovery, Validation, Creation, Building'}
      ]
    },
    'Applied Mathematics': {
      low: [
        {q:'A vector has:', options:['Magnitude only','Direction only','Both magnitude and direction','Neither'], answer:'Both magnitude and direction'},
        {q:'Matrix addition requires matrices of:', options:['Same size','Square shape','Equal determinant','Same eigenvalues'], answer:'Same size'},
        {q:'The identity matrix has:', options:['All zeros','1s on diagonal 0s elsewhere','All ones','Random values'], answer:'1s on diagonal 0s elsewhere'}
      ],
      medium: [
        {q:'The determinant of [a b; c d] is:', options:['a+d','ad-bc','ab-cd','ac+bd'], answer:'ad-bc'},
        {q:'Matrix multiplication AB equals BA:', options:['Always','Never','Sometimes','Only for square matrices'], answer:'Sometimes'},
        {q:'Eigenvalues of matrix A satisfy:', options:['Av=lambda*v','Av=v+lambda','A+v=lambda','A*lambda=v'], answer:'Av=lambda*v'}
      ],
      difficult: [
        {q:'The rank of a matrix is:', options:['Number of rows','Number of columns','Dimension of the column space','Trace of the matrix'], answer:'Dimension of the column space'},
        {q:'Gram-Schmidt orthogonalization produces:', options:['A diagonal matrix','An orthonormal basis','The inverse','The eigendecomposition'], answer:'An orthonormal basis'},
        {q:'The Spectral Theorem applies to:', options:['All matrices','Symmetric real matrices with real eigenvalues','Only diagonal matrices','Invertible matrices only'], answer:'Symmetric real matrices with real eigenvalues'}
      ]
    },
    'English': {
      low: [
        {q:'Which is a noun?', options:['Run','Beautiful','Happiness','Quickly'], answer:'Happiness'},
        {q:'Which tense is "She walks"?', options:['Present','Past','Future','Perfect'], answer:'Present'},
        {q:'An adjective describes:', options:['A verb','A noun or pronoun','Another adjective only','A preposition'], answer:'A noun or pronoun'}
      ],
      medium: [
        {q:'A compound sentence contains:', options:['One independent clause','Two or more independent clauses','A dependent clause only','No subject'], answer:'Two or more independent clauses'},
        {q:'"She runs every day" is which tense?', options:['Past simple','Present simple','Present continuous','Future simple'], answer:'Present simple'},
        {q:'In "I wanted to go, but it rained," the conjunction is:', options:['Wanted','Rained','But','Go'], answer:'But'}
      ],
      difficult: [
        {q:'The subjunctive mood is used for:', options:['Statements of fact','Hypothetical or contrary-to-fact situations','Questions only','Commands only'], answer:'Hypothetical or contrary-to-fact situations'},
        {q:'A dangling modifier error occurs when:', options:['Subject and verb disagree','Modifier does not clearly modify the intended noun','Two clauses joined without punctuation','Pronoun has no antecedent'], answer:'Modifier does not clearly modify the intended noun'},
        {q:'"The book, which was on the shelf, fell." The clause is:', options:['Restrictive','Non-restrictive','Adverbial','Nominal'], answer:'Non-restrictive'}
      ]
    },
    'History of Ethiopia': {
      low: [
        {q:'Aksum was located in:', options:['Kenya','Ethiopia','Egypt','Sudan'], answer:'Ethiopia'},
        {q:'The Aksumites used the script:', options:["Ge'ez",'Latin','Arabic','Hebrew'], answer:"Ge'ez"},
        {q:'Aksum was known for trade in:', options:['Rice and wheat','Ivory, gold, and spices','Cotton and silk','Oil and minerals'], answer:'Ivory, gold, and spices'}
      ],
      medium: [
        {q:'Christianity became the state religion of Aksum under:', options:['Yohannes IV','Ezana','Tewodros','Haile Selassie'], answer:'Ezana'},
        {q:'The tall stone structures built by Aksumites are called:', options:['Pyramids','Obelisks or Stelae','Cathedrals','Ziggurats'], answer:'Obelisks or Stelae'},
        {q:'Aksum traded mainly through which sea?', options:['Mediterranean','Red Sea','Indian Ocean','Caspian Sea'], answer:'Red Sea'}
      ],
      difficult: [
        {q:'The Aksumite currency was significant because:', options:['Made of wood','One of first sub-Saharan African coinage systems','Borrowed from Rome','Had no international value'], answer:'One of first sub-Saharan African coinage systems'},
        {q:'The decline of Aksum was primarily linked to:', options:['Military conquest by Egypt','Shifts in trade routes and environmental degradation','A massive earthquake','Invasion by Zagwe dynasty'], answer:'Shifts in trade routes and environmental degradation'},
        {q:'Ezana inscription at Aksum is evidence of:', options:['Founding of the empire','Adoption of Christianity and military campaigns','A peace treaty with Rome','Construction of obelisks'], answer:'Adoption of Christianity and military campaigns'}
      ]
    },
    'Moral and Civic Education': {
      low: [
        {q:'Ethics deals with:', options:['Right and wrong','Natural laws','Computer codes','Economic models'], answer:'Right and wrong'},
        {q:'The Golden Rule says:', options:['Do unto others...','Survival of fittest','Everything is relative','Might makes right'], answer:'Do unto others...'},
        {q:'Virtue ethics was developed by:', options:['Kant','Mill','Aristotle','Plato'], answer:'Aristotle'}
      ],
      medium: [
        {q:'Utilitarianism judges actions by:', options:['Their intention alone','Consequences for overall happiness','Adherence to rules','Cultural norms'], answer:'Consequences for overall happiness'},
        {q:'The categorical imperative is from:', options:['Aristotle','Kant','Mill','Hume'], answer:'Kant'},
        {q:'Moral relativism holds that:', options:['There is one universal moral code','Moral truths are objective','Moral standards are relative to culture','Ethics is impossible'], answer:'Moral standards are relative to culture'}
      ],
      difficult: [
        {q:'The trolley problem illustrates tension between:', options:['Deontology and relativism','Deontological and consequentialist ethics','Virtue ethics and nihilism','Applied and meta-ethics'], answer:'Deontological and consequentialist ethics'},
        {q:"Rawls' veil of ignorance is designed to:", options:['Prove God exists','Derive principles of justice without bias','Justify authoritarianism','Argue for cultural relativism'], answer:'Derive principles of justice without bias'},
        {q:'Care ethics (Gilligan) prioritizes:', options:['Universal rules','Consequences for society','Relationships and context','Individual rights only'], answer:'Relationships and context'}
      ]
    }
  };

  function getQuestionsFor(c, l) {
    if (allQuestions[c] && allQuestions[c][l]) return allQuestions[c][l];
    return [
      {q:'What is the capital of France?', options:['Berlin','Madrid','Paris','Lisbon'], answer:'Paris'},
      {q:'Which planet is known as the Red Planet?', options:['Mars','Jupiter','Venus','Saturn'], answer:'Mars'},
      {q:'Who wrote Romeo and Juliet?', options:['Charles Dickens','Jane Austen','William Shakespeare','Mark Twain'], answer:'William Shakespeare'}
    ];
  }

  function updateProgress() {
    var total = questions.length;
    var done  = Math.min(currentQ, total);
    document.getElementById('progressLabel').textContent = 'Question ' + done + ' of ' + total;
    document.getElementById('progressBar').style.width = Math.round((done / total) * 100) + '%';
  }

  function startExam(selectedMode) {
    mode = selectedMode;
    document.getElementById('modeSelection').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'block';
    questions = getQuestionsFor(course, level);
    answers   = new Array(questions.length).fill(null);
    currentQ  = 0;
    showQuestion(0);
  }

  function showQuestion(index) {
    updateProgress();
    var qDiv = document.getElementById('questionsDiv');
    qDiv.innerHTML = '';
    document.getElementById('finishBtn').style.display = 'none';
    document.getElementById('result').innerHTML = '';

    if (index >= questions.length) {
      if (mode === 'finish') {
        document.getElementById('finishBtn').style.display = 'block';
      } else {
        finishExam();
      }
      return;
    }

    var q    = questions[index];
    var wrap = document.createElement('div');
    wrap.className = 'question';

    var qText = document.createElement('div');
    qText.className = 'question-text';
    qText.innerHTML = '<strong>Q' + (index + 1) + ':</strong> ' + q.q;
    wrap.appendChild(qText);

    var optList = document.createElement('div');
    optList.className = 'options-list';

    q.options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.textContent = opt;
      btn.className   = 'option';
      btn.onclick = function() { selectAnswer(opt, index, wrap); };
      optList.appendChild(btn);
    });

    wrap.appendChild(optList);
    qDiv.appendChild(wrap);
  }

  function selectAnswer(selected, index, wrap) {
    answers[index] = selected;
    var btns = wrap.querySelectorAll('.option');
    btns.forEach(function(b) {
      b.disabled = true;
      if (b.textContent === questions[index].answer) b.classList.add('correct');
      else if (b.textContent === selected && selected !== questions[index].answer) b.classList.add('wrong');
    });

    if (mode === 'instant') {
      setTimeout(function() {
        currentQ++;
        showQuestion(currentQ);
      }, 900);
    } else {
      setTimeout(function() {
        currentQ++;
        showQuestion(currentQ);
      }, 600);
    }
  }

  function finishExam() {
    document.getElementById('questionsDiv').innerHTML = '';
    document.getElementById('finishBtn').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';

    var correct = 0;
    answers.forEach(function(a, i) {
      if (a === questions[i].answer) correct++;
    });
    var total      = questions.length;
    var percentage = Math.round((correct / total) * 100);
    var emoji      = percentage >= 80 ? '🌟' : percentage >= 50 ? '👍' : '📖';

    document.getElementById('result').innerHTML =
      '<p style="font-size:2.5em;margin-bottom:10px;">' + emoji + '</p>' +
      '<p><strong>You got ' + correct + ' / ' + total + ' correct</strong></p>' +
      '<p style="font-size:1.3em;color:#ff9800;font-weight:bold;">' + percentage + '%</p>' +
      '<button onclick="location.reload()">🔁 Try Again</button>' +
      '<br><a href="index.html" style="display:inline-block;margin-top:12px;color:#1e3c72;font-weight:bold;">← Back to Dashboard</a>';
  }
</script>
</body>
</html>
