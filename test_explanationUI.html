<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explanation System Test</title>
<link rel="stylesheet" href="explanations.css">
</head>
<body>

<!-- Example container for explanation display -->
<div id="explanationDisplayContainer" class="explanation-system">
  <div class="explanation-display" id="explanationDisplay">
    <div class="explanation-content" id="explanationContent">Click "Generate" to see explanation</div>
  </div>
  <div class="explanation-controls">
    <button class="exp-btn" id="generateBtn">Generate Explanation</button>
  </div>
</div>

<!-- Generator panel -->
<div id="explanationGeneratorPanel"></div>

<!-- JS files -->
<script src="aiManager.js"></script>
<script src="cloudflareHandler.js"></script>
<script src="firestoreHandler.js"></script>
<script src="explanationDisplaySystem.js"></script>
<script src="explanationGeneratorPanel.js"></script>
<script src="explanationSystem-init.js"></script>
<script src="INTEGRATION_GUIDE.js"></script>

<script>
  document.getElementById('generateBtn').addEventListener('click', async () => {
    if (!window.ExplanationSystem.isInitialized) {
      console.warn('System not initialized yet');
      return;
    }
    const dummyQuestion = "What is the capital of France?";
    const dummyAnswer = "Paris";
    const result = await window.ExplanationSystem.generateExplanation(dummyQuestion, dummyAnswer, 1);
    console.log(result);
    document.getElementById('explanationContent').textContent = result.text || 'Generated explanation here';
  });
</script>

</body>
</html>
